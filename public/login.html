<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 통합 로그인</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f9fafb; color: #111827; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-container { width: 100%; max-width: 420px; padding: 36px 28px; background-color: #ffffff; border: 1px solid #e5e8eb; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .logo-box { text-align: center; margin-bottom: 24px; cursor: pointer; }
        .logo-text { font-size: 22px; font-weight: 800; color: #1967d2; letter-spacing: -0.5px; }
        
        .role-switch-tabs { display: flex; background-color: #f3f4f6; border-radius: 9999px; padding: 4px; margin-bottom: 24px; }
        .tab-btn { flex: 1; border: none; background: none; padding: 10px 0; font-size: 14px; font-weight: 700; color: #6b7280; cursor: pointer; border-radius: 9999px; transition: all 0.2s; }
        .tab-btn.active { background-color: #ffffff; color: #1967d2; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .page-heading { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: #4b5563; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 13px 14px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 14.5px; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: #1967d2; background-color: #f4f9ff; }
        
        .btn-primary { width: 100%; background-color: #1967d2; color: #ffffff; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background-color 0.2s; }
        .btn-primary:hover { background-color: #1152b3; }
        
        .footer-link { text-align: center; margin-top: 20px; font-size: 13.5px; color: #6b7280; }
        .footer-link span { color: #1967d2; font-weight: 700; cursor: pointer; text-decoration: underline; margin-left: 4px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-box" onclick="location.href='/'">
            <span class="logo-text">SILVERWORKS</span>
        </div>
        
        <div class="role-switch-tabs">
            <button type="button" id="tabSeeker" class="tab-btn active" onclick="setRole('seeker')">구직 시니어 회원</button>
            <button type="button" id="tabEmployer" class="tab-btn" onclick="setRole('employer')">구인 사업장 사장님</button>
        </div>
        
        <h2 class="page-heading" id="formTitle">시니어 회원 로그인</h2>
        
        <form onsubmit="handleAuthSubmit(event)">
            <div class="form-group">
                <label class="form-label">아이디 (ID)</label>
                <input type="text" id="username" class="form-input" required placeholder="아이디를 입력하세요">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호 (Password)</label>
                <input type="password" id="password" class="form-input" required placeholder="비밀번호를 입력하세요">
            </div>
            
            <div id="registerFields" style="display: none;">
                <div class="form-group">
                    <label class="form-label">성함 또는 상호명</label>
                    <input type="text" id="name" class="form-input" placeholder="정식 명칭을 입력하세요">
                </div>
                <div class="form-group">
                    <label class="form-label">연락처 전화번호</label>
                    <input type="text" id="phone" class="form-input" placeholder="010-0000-0000">
                </div>
            </div>
            
            <button type="submit" class="btn-primary" id="submitBtn">로그인하기</button>
        </form>
        
        <div class="footer-link" id="toggleLink">
            아직 실버웍스 회원이 아니십니까?<span onclick="toggleMode('register')">회원가입 신청 ➔</span>
        </div>
    </div>

    <script>
        let currentRole = 'seeker';
        let isRegisterMode = false;

        function setRole(role) {
            currentRole = role;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(role === 'employer') {
                document.getElementById('tabEmployer').classList.add('active');
                document.getElementById('formTitle').innerText = isRegisterMode ? '구인 사장님 회원가입 신청' : '구인 사장님 회원 로그인';
            } else {
                document.getElementById('tabSeeker').classList.add('active');
                document.getElementById('formTitle').innerText = isRegisterMode ? '구직 시니어 회원가입 신청' : '시니어 회원 로그인';
            }
        }

        function toggleMode(mode) {
            isRegisterMode = (mode === 'register');
            document.getElementById('registerFields').style.display = isRegisterMode ? 'block' : 'none';
            document.getElementById('submitBtn').innerText = isRegisterMode ? '회원가입 전산 승인 요청' : '로그인하기';
            document.getElementById('toggleLink').innerHTML = isRegisterMode ? 
                `이미 계정이 있으십니까?<span onclick="toggleMode('login')">로그인 화면 전환 ➔</span>` : 
                `아직 실버웍스 회원이 아니십니까?<span onclick="toggleMode('register')">회원가입 신청 ➔</span>`;
            setRole(currentRole);
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (isRegisterMode) {
                const name = document.getElementById('name').value.trim();
                const phone = document.getElementById('phone').value.trim();
                if(!name || !phone) { alert('성함(상호명)과 연락처를 입력하세요.'); return; }

                fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, name, phone, role: currentRole })
                }).then(res => res.json()).then(data => {
                    alert(data.message);
                    if(data.success) toggleMode('login');
                });
            } else {
                fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, requested_role: currentRole })
                }).then(async res => {
                    const data = await res.json();
                    if(!res.ok) { alert(data.message || '로그인 실패'); return; }
                    alert(`로그인 성공! @${data.user.name} 환영합니다.`);
                    location.href = '/index.html';
                });
            }
        }
    </script>
</body>
</html>
