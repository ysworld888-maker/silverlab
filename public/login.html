<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실버웍스 - 회원가입 및 로그인</title>
    <!-- 토스 특유의 미니멀리즘 인터페이스와 탭 전환형 가입 CSS 셋업 -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #ffffff;
            color: #333d4b;
            padding-bottom: 60px;
        }
        /* 토스 고유의 상단 네비게이션 메뉴 헤더 바 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #f2f4f6;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: #1967d2;
            letter-spacing: -0.5px;
        }
        .nav-menu-group {
            display: flex;
            gap: 8px;
        }
        .nav-link-btn {
            background: none;
            border: none;
            color: #4e5968;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .nav-link-btn:hover {
            background-color: #f2f4f6;
            color: #1967d2;
        }
        .auth-container {
            max-width: 440px;
            margin: 60px auto 0 auto;
            padding: 0 20px;
        }
        .auth-toggle-tabs {
            display: flex;
            border-bottom: 2px solid #f2f4f6;
            margin-bottom: 32px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            font-weight: 700;
            color: #8b95a1;
            cursor: pointer;
            text-align: center;
        }
        .tab-btn.active {
            color: #1967d2;
            border-bottom: 2px solid #1967d2;
            margin-bottom: -2px;
        }
        .auth-box {
            display: none;
        }
        .auth-box.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #4e5968;
            margin-bottom: 8px;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #d1d6db;
            font-size: 15px;
            color: #1b1c1e;
            background-color: #ffffff;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #1967d2;
        }
        .terms-box {
            background-color: #f9fafb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #f2f4f6;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #333d4b;
            cursor: pointer;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn-auth-submit {
            width: 100%;
            background-color: #1967d2;
            color: #ffffff;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-auth-submit:hover {
            background-color: #1152b3;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href='/'">
            <svg width="24" height="24" viewBox="0 0 100 100" fill="none" xmlns="http://w3.org">
                <path d="M15 55C25 32 43 23 68 28C84 31.5 88.5 44 79.5 51C68 58 57 47.5 48 60C39 72.5 25.5 76 12 68.5C0.75 64 0.75 62 15 55Z" stroke="#1967d2" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">SILVERWORKS</span>
        </div>
        <div class="nav-menu-group">
            <button class="nav-link-btn" onclick="location.href='/'">홈</button>
            <button class="nav-link-btn" onclick="location.href='/board.html'">매칭 게시판</button>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-toggle-tabs">
            <button id="tabLogin" class="tab-btn active" onclick="switchTab('login')">로그인</button>
            <button id="tabRegister" class="tab-btn" onclick="switchTab('register')">회원가입</button>
        </div>

        <div id="loginBox" class="auth-box active">
            <div class="form-group">
                <label class="form-label">아이디</label>
                <input type="text" id="loginId" class="form-input" placeholder="아이디를 입력해 주세요">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호 (SHA-256 자동 보호)</label>
                <input type="password" id="loginPw" class="form-input" placeholder="비밀번호를 입력해 주세요">
            </div>
            <button class="btn-auth-submit" onclick="handleLogin()">실버웍스 로그인</button>
        </div>

        <div id="registerBox" class="auth-box">
            <div class="form-group">
                <label class="form-label">사용할 아이디 (금지어 필터 감시)</label>
                <input type="text" id="regId" class="form-input" placeholder="영문 또는 숫자 기입">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호</label>
                <input type="password" id="regPw" class="form-input" placeholder="안전한 비밀번호 셋업">
            </div>
            <div class="form-group">
                <label class="form-label">성명 또는 매장명 (경찰서 고발 연동)</label>
                <input type="text" id="regName" class="form-input" placeholder="실명 또는 정식 매장명 기입">
            </div>
            <div class="form-group">
                <label class="form-label">휴대폰 번호</label>
                <input type="tel" id="regPhone" class="form-input" placeholder="예: 01012345678">
            </div>
            <div class="form-group">
                <label class="form-label">회원 유형 선택</label>
                <select id="regRole" class="form-select" onchange="toggleBizType(this.value)">
                    <option value="seeker">일자리를 구하는 시니어 베테랑 (seeker)</option>
                    <option value="employer">직원을 구하는 구인 매장 고용주 (employer)</option>
                </select>
            </div>
            <div class="form-group" id="bizTypeGroup" style="display:none;">
                <label class="form-label">매장 업종 분류 (표준산업분류 규격 검증)</label>
                <select id="regBizType" class="form-select">
                    <option value="일반카페">일반 외식업 / 카페 / 베이커리</option>
                    <option value="유통물류">편의점 / 마트 / 유통 물류업</option>
                    <option value="유흥주점">한국표준산업분류 유흥주점업 (가입 차단 대상)</option>
                    <option value="마사지">유해 마사지 및 안마시술소 (가입 차단 대상)</option>
                </select>
            </div>
            <div class="terms-box">
                <label class="checkbox-group">
                    <input type="checkbox" id="regTerms">
                    <span>실버웍스 이용약관 및 개인정보 처리방침에 동의합니다. (필수)</span>
                </label>
            </div>
            <button class="btn-auth-submit" onclick="handleRegister()">신원 검증 회원가입 신청</button>
        </div>
    </div>
    <!-- 가동 자바스크립트 엔진 -->
    <script>
        function switchTab(type) {
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('tabRegister').classList.remove('active');
            document.getElementById('loginBox').classList.remove('active');
            document.getElementById('registerBox').classList.remove('active');
            
            if(type === 'login') {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('loginBox').classList.add('active');
            } else {
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('registerBox').classList.add('active');
            }
        }

        function toggleBizType(role) {
            document.getElementById('bizTypeGroup').style.display = (role === 'employer') ? 'block' : 'none';
        }

        function handleRegister() {
            const username = document.getElementById('regId').value.trim();
            const password = document.getElementById('regPw').value.trim();
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const role = document.getElementById('regRole').value;
            const biz_type = document.getElementById('regBizType').value;
            const terms_agree = document.getElementById('regTerms').checked;

            if(!username || !password || !name || !phone) {
                alert('알림: 전산 접수를 위해 가입 서식을 공백 없이 채워주세요.');
                return;
            }

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, name, phone, role, biz_type, terms_agree })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert(data.message);
                    switchTab('login');
                } else {
                    alert('가입 거절: ' + data.message);
                }
            })
            .catch(err => {
                alert('가입 거절: 유흥·성매매 단어 감지 및 표준산업분류 유해업종으로 판명되어 가입이 차단되었습니다. 위반 사항은 즉시 경찰서로 고발 이송됩니다.');
            });
        }

        function handleLogin() {
            const username = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPw').value.trim();

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    localStorage.setItem('sw_username', data.user.username);
                    localStorage.setItem('sw_role', data.user.role);
                    alert(data.user.name + '님 환영합니다! 실버웍스 전산 로그인 인증이 완수되었습니다.');
                    location.href = '/board.html'; 
                } else {
                    alert('인증 실패: ' + data.message);
                }
            })
            .catch(err => alert('로그인 실패: 승인 대기 상태이거나 인증 정보가 잘못되었습니다.'));
        }
    </script>
</body>
</html>
