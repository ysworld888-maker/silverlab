<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실버웍스 - 신원인증 및 통합 로그인 센터</title>
    <!-- 토스 특유의 와이드 여백 미학 및 탭 토글 분리형 로그인 CSS 셋업 -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #ffffff;
            color: #333d4b;
            padding-bottom: 60px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #f2f4f6;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: #1967d2;
            letter-spacing: -0.5px;
        }
        .nav-menu-group {
            display: flex;
            gap: 8px;
        }
        .nav-link-btn {
            background: none;
            border: none;
            color: #4e5968;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .nav-link-btn:hover {
            background-color: #f2f4f6;
            color: #1967d2;
        }
        /* 중앙 반응형 카드 컨테이너 배치 락 */
        .auth-wrapper {
            max-width: 460px;
            margin: 50px auto 0 auto;
            padding: 0 20px;
        }
        .auth-toggle-tabs {
            display: flex;
            border-bottom: 2px solid #f2f4f6;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 700;
            color: #8b95a1;
            cursor: pointer;
            text-align: center;
            transition: color 0.2s;
        }
        .tab-btn.active {
            color: #1967d2;
            border-bottom: 2px solid #1967d2;
            margin-bottom: -2px;
        }
        .auth-box {
            display: none;
        }
        .auth-box.active {
            display: block;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #4e5968;
            margin-bottom: 8px;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #d1d6db;
            font-size: 15px;
            color: #1b1c1e;
            background-color: #ffffff;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #1967d2;
        }
        .terms-box {
            background-color: #f9fafb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #f2f4f6;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #333d4b;
            cursor: pointer;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn-auth-submit {
            width: 100%;
            background-color: #1967d2;
            color: #ffffff;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.2s;
        }
        .btn-auth-submit:hover {
            background-color: #1152b3;
        }
        .role-indicator {
            display: inline-block;
            background-color: #e8f3ff;
            color: #1967d2;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href='/'">
            <svg width="24" height="24" viewBox="0 0 100 100" fill="none" xmlns="http://w3.org">
                <path d="M15 55C25 32 43 23 68 28C84 31.5 88.5 44 79.5 51C68 58 57 47.5 48 60C39 72.5 25.5 76 12 68.5C0.75 64 0.75 62 15 55Z" stroke="#1967d2" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">SILVERWORKS</span>
        </div>
        <div class="nav-menu-group">
            <button class="nav-link-btn" onclick="location.href='/'">홈</button>
            <button class="nav-link-btn" onclick="location.href='/board.html'">매칭 게시판</button>
        </div>
    </header>

    <div class="auth-wrapper">
        <!-- 로그인 / 회원가입 마스터 탭 -->
        <div class="auth-toggle-tabs">
            <button id="tabLogin" class="tab-btn active" onclick="switchTab('login')">로그인</button>
            <button id="tabRegister" class="tab-btn" onclick="switchTab('register')">즉시 회원가입</button>
        </div>

        <!-- 1. 통합 검증 분리형 로그인 채널 구역 -->
        <div id="loginBox" class="auth-box active">
            <div id="roleBadge" class="role-indicator">채널 감지 중...</div>
            <div class="form-group">
                <label class="form-label">아이디</label>
                <input type="text" id="loginId" class="form-input" placeholder="아이디를 입력해 주세요">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호 (SHA-256 자동 해시 보호)</label>
                <input type="password" id="loginPw" class="form-input" placeholder="비밀번호를 입력해 주세요">
            </div>
            <button class="btn-auth-submit" onclick="handleLogin()">실버웍스 보안 로그인</button>
        </div>

        <!-- 2. 철벽 가입 신청 폼 구역 (아이디/비번 즉시 가입 시스템) -->
        <div id="registerBox" class="auth-box">
            <div class="form-group">
                <label class="form-label">사용할 아이디 (경찰서 고발 필터 작동)</label>
                <input type="text" id="regId" class="form-input" placeholder="로그인에 사용할 영문/숫자 아이디">
            </div>
            <div class="form-group">
                <label class="form-label">비밀번호 설정</label>
                <input type="password" id="regPw" class="form-input" placeholder="안전한 암호 입력">
            </div>
            <div class="form-group">
                <label class="form-label">성명 또는 매장명</label>
                <input type="text" id="regName" class="form-input" placeholder="시니어 실명 또는 정식 매장 사장님 성함">
            </div>
            <div class="form-group">
                <label class="form-label">휴대폰 번호</label>
                <input type="tel" id="regPhone" class="form-input" placeholder="예: 01012345678 (공백 없이)">
            </div>
            <div class="form-group">
                <label class="form-label">가입 회원 등급 유형</label>
                <select id="regRole" class="form-select">
                    <option value="seeker">일자리를 구하는 시니어 베테랑 (seeker)</option>
                    <option value="employer">직원을 구하는 구인 매장 사장님 (employer)</option>
                </select>
            </div>
            
            <div class="terms-box">
                <label class="checkbox-group">
                    <input type="checkbox" id="regTerms">
                    <span>실버웍스 약관 및 개인정보 수집 이용 동의 (필수)</span>
                </label>
            </div>
            <button class="btn-auth-submit" onclick="handleRegister()">신원 검증 가입 신청하기</button>
        </div>
    </div>
    <!-- 유기적 주소 판별 및 로그인 동적 제어 자바스크립트 엔진 -->
    <script>
        // 사장님/시니어 각각 어떤 버튼을 타고 왔는지 주소창 파라미터(?type=) 실시간 역추적 감지
        const urlParams = new URLSearchParams(window.location.search);
        let currentRoleChannel = urlParams.get('type') || 'seeker'; // 기본값은 시니어로 유치

        function updateRoleBadge() {
            const badge = document.getElementById('roleBadge');
            if (currentRoleChannel === 'employer') {
                badge.innerText = "구인 사장님 전용 로그인 채널";
                badge.style.backgroundColor = "#e8f3ff";
                badge.style.color = "#1967d2";
                document.getElementById('regRole').value = 'employer';
            } else {
                badge.innerText = "구직 시니어 전용 로그인 채널";
                badge.style.backgroundColor = "#f2f4f6";
                badge.style.color = "#4e5968";
                document.getElementById('regRole').value = 'seeker';
            }
        }

        function switchTab(type) {
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('tabRegister').classList.remove('active');
            document.getElementById('loginBox').classList.remove('active');
            document.getElementById('registerBox').classList.remove('active');
            
            if(type === 'login') {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('loginBox').classList.add('active');
                updateRoleBadge();
            } else {
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('registerBox').classList.add('active');
            }
        }

        // 아이디/비밀번호 다이렉트 회원가입 전산 신청 라우터
        function handleRegister() {
            const username = document.getElementById('regId').value.trim();
            const password = document.getElementById('regPw').value.trim();
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const role = document.getElementById('regRole').value;
            const terms_agree = document.getElementById('regTerms').checked;

            if (!username || !password || !name || !phone) {
                alert('알림: 전산 등록 접수를 위해 가입 폼의 빈칸을 모두 채워주세요.');
                return;
            }
            if (!terms_agree) {
                alert('의무 동의: 이용약관 및 개인정보 동의 체크박스에 체크하셔야 회원가입이 처리됩니다.');
                return;
            }

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, name, phone, role })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert(data.message);
                    currentRoleChannel = role;
                    switchTab('login');
                } else {
                    alert('가입 거절: ' + data.message);
                }
            })
            .catch(err => {
                alert('가입 거절: 등록이 원천 차단되었습니다.');
            });
        }

        // 사장님 / 시니어 역할 분리 대조 대기업 ERP 규격 인증 로그인 엔진
        function handleLogin() {
            const username = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPw').value.trim();

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, requested_role: currentRoleChannel })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    // 로그인 세션 토큰 부여 영구 보존
                    localStorage.setItem('sw_username', data.user.username);
                    localStorage.setItem('sw_role', data.user.role);
                    
                    alert(data.user.name + '님 환영합니다! 실버웍스 로그인 인증이 완수되었습니다.');
                    
                    // 로그인 성공 시 역할 권한별로 유기적 다이렉트 화면 전산 이동 분기
                    if (data.user.role === 'employer') {
                        location.href = '/board.html'; // 사장님은 매칭 공고 게시판으로 유기적 즉시 워프
                    } else {
                        location.href = '/seeker.html'; // 시니어는 본인 프로필 표준이력서 등록 구역으로 유기적 즉시 워프
                    }
                } else {
                    alert('인증 실패: ' + data.message);
                }
            })
            .catch(err => {
                alert('인증 오류: 신원 권한 승인 대기 상태이거나 로그인 채널 등급이 일치하지 않습니다.');
            });
        }

        // 페이지 진입 초기 구동 시 역할 뱃지 실시간 판별 가동
        updateRoleBadge();
    </script>
</body>
</html>
