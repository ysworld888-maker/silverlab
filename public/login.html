<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 인증 제어 센터</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #f9fafb; color: #333d4b; padding: 40px 20px; }
        .login-box { max-width: 420px; margin: 40px auto; background: white; border-radius: 16px; border: 1px solid #e5e8eb; padding: 30px; }
        .logo-center { text-align: center; margin-bottom: 24px; cursor: pointer; }
        .logo-text { font-size: 22px; font-weight: 800; color: #1967d2; }
        .tab-group { display: flex; margin-bottom: 20px; border-bottom: 2px solid #f2f4f6; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 15px; font-weight: 600; color: #6b7684; background: none; border: none; cursor: pointer; }
        .tab-btn.active { color: #1967d2; border-bottom: 2px solid #1967d2; }
        .form-panel { display: none; } .form-panel.active { display: block; }
        .input-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13.5px; font-weight: 600; color: #4e5968; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #d1d6db; font-size: 14.5px; outline: none; }
        .form-input:focus { border-color: #1967d2; background-color: #f4f9ff; }
        .btn-blue { width: 100%; background-color: #1967d2; color: white; padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-center" onclick="location.href='/'">
            <div class="logo-text">SILVERWORKS</div>
        </div>

        <div class="tab-group">
            <button id="tabL" class="tab-btn active" onclick="switchMode('login')">로그인</button>
            <button id="tabR" class="tab-btn" onclick="switchMode('register')">회원가입</button>
        </div>

        <div id="panelLogin" class="form-panel active">
            <div class="input-group"><label class="form-label">아이디</label><input type="text" id="lId" class="form-input"></div>
            <div class="input-group"><label class="form-label">비밀번호</label><input type="password" id="lPw" class="form-input"></div>
            <button class="btn-blue" onclick="submitLogin()">인증 후 플랫폼 진입</button>
        </div>

        <div id="panelRegister" class="form-panel">
            <div class="input-group"><label class="form-label">회원 아이디 생성</label><input type="text" id="rId" class="form-input"></div>
            <div class="input-group"><label class="form-label">보안 비밀번호</label><input type="password" id="rPw" class="form-input"></div>
            <div class="input-group"><label class="form-label">성명 또는 정식 매장명</label><input type="text" id="rName" class="form-input"></div>
            <div class="input-group"><label class="form-label">휴대폰 번호 명세</label><input type="tel" id="rPhone" class="form-input" placeholder="예: 01012345678"></div>
            <button class="btn-blue" onclick="submitRegister()">회원 등급 가입 신청하기</button>
        </div>
    </div>

    <script>
        let currentRole = "seeker";
        window.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('type') === 'employer') currentRole = "employer";
        });

        function switchMode(mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            if(mode === 'login') {
                document.getElementById('tabL').classList.add('active');
                document.getElementById('panelLogin').classList.add('active');
            } else {
                document.getElementById('tabR').classList.add('active');
                document.getElementById('panelRegister').classList.add('active');
            }
        }

        function submitLogin() {
            const id = document.getElementById('lId').value.trim();
            const pw = document.getElementById('lPw').value;
            if(!id || !pw) return;

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: id, password: pw, requested_role: currentRole })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    localStorage.setItem('sw_username', data.user.username);
                    localStorage.setItem('sw_role', data.user.role);
                    alert('로그인에 성공했습니다. 제어 대시보드로 이동합니다.');
                    location.href = '/profile.html';
                } else { alert('인증 오류: ' + data.message); }
            });
        }

        function submitRegister() {
            const id = document.getElementById('rId').value.trim();
            const pw = document.getElementById('rPw').value;
            const nm = document.getElementById('rName').value.trim();
            const ph = document.getElementById('rPhone').value.trim();
            if(!id || !pw || !nm || !ph) return;

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: id, password: pw, name: nm, phone: ph, role: currentRole })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert('가입 신청서 전산 접수 완료! 최고관리자 승인 처리 후 서비스 이용이 가동됩니다.');
                    switchMode('login');
                } else { alert('가입 거부: ' + data.message); }
            });
        }
    </script>
</body>
</html>
