<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 인증 제어 센터</title>
    <!-- [신원 분류 등급 선택 단추 신설] 토스 미학 오션블루 컬러 기반 이중 분기형 CSS 스타일 명세 -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f9fafb; color: #333d4b; padding: 40px 20px; }
        .login-box { max-width: 420px; margin: 40px auto; background: white; border-radius: 16px; border: 1px solid #e5e8eb; padding: 30px; box-shadow: 0 4px 16px rgba(0,0,0,0.01); }
        .logo-center { text-align: center; margin-bottom: 24px; cursor: pointer; }
        .logo-text { font-size: 22px; font-weight: 800; color: #1967d2; letter-spacing: -0.5px; }
        
        .tab-group { display: flex; margin-bottom: 20px; border-bottom: 2px solid #f2f4f6; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 15px; font-weight: 600; color: #6b7684; background: none; border: none; cursor: pointer; transition: color 0.15s; }
        .tab-btn.active { color: #1967d2; border-bottom: 2px solid #1967d2; }
        
        /* [핵심 신설] 시니어 회원 / 사장님 회원 자율 선택용 세그먼트 단추 스타일 양식 */
        .role-selector-container { display: flex; background-color: #f2f4f6; border-radius: 10px; padding: 4px; margin-bottom: 20px; gap: 4px; }
        .role-select-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; font-size: 13.5px; font-weight: 700; color: #4e5968; background-color: transparent; cursor: pointer; transition: all 0.2s ease; text-align: center; }
        .role-select-btn.active { background-color: #1967d2; color: #ffffff; box-shadow: 0 2px 6px rgba(25, 103, 210, 0.15); }
        
        .form-panel { display: none; } .form-panel.active { display: block; }
        .input-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13.5px; font-weight: 600; color: #4e5968; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #d1d6db; font-size: 14.5px; font-weight: 600; color: #1b1c1e; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: #1967d2; background-color: #f4f9ff; }
        .btn-blue { width: 100%; background-color: #1967d2; color: #ffffff; padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; transition: opacity 0.2s; margin-top: 10px; }
        .btn-blue:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-center" onclick="location.href='/'">
            <div class="logo-text">SILVERWORKS</div>
        </div>

        <div class="tab-group">
            <button id="tabL" class="tab-btn active" onclick="switchMode('login')">로그인</button>
            <button id="tabR" class="tab-btn" onclick="switchMode('register')">회원가입</button>
        </div>

        <!-- [사장님 오더 완벽 반영] 시니어 회원 / 사장님 회원 자율 전환 선택 세그먼트 단추 본체 -->
        <div class="role-selector-container">
            <button type="button" id="roleBtnSeeker" class="role-select-btn active" onclick="setRole('seeker')">시니어 회원</button>
            <button type="button" id="roleBtnEmployer" class="role-select-btn" onclick="setRole('employer')">사장님 회원</button>
        </div>

        <!-- 로그인 패널 폼 -->
        <div id="panelLogin" class="form-panel active">
            <div class="input-group"><label class="form-label">아이디</label><input type="text" id="lId" class="form-input" autocomplete="username"></div>
            <div class="input-group"><label class="form-label">비밀번호</label><input type="password" id="lPw" class="form-input" autocomplete="current-password"></div>
            <button type="button" class="btn-blue" onclick="submitLogin()">인증 후 플랫폼 진입</button>
        </div>

        <!-- 회원가입 패널 폼 -->
        <div id="panelRegister" class="form-panel">
            <div class="input-group"><label class="form-label">회원 아이디 생성</label><input type="text" id="rId" class="form-input" autocomplete="username"></div>
            <div class="input-group"><label class="form-label">보안 비밀번호</label><input type="password" id="rPw" class="form-input" autocomplete="new-password"></div>
            <div class="input-group"><label class="form-label" id="nameLabel">성명 또는 정식 매장명</label><input type="text" id="rName" class="form-input"></div>
            <div class="input-group"><label class="form-label">휴대폰 번호 명세</label><input type="tel" id="rPhone" class="form-input" placeholder="예: 01012345678"></div>
            <button type="button" class="btn-blue" id="btnRegisterSubmit" onclick="submitRegister()">시니어 회원 가입 신청하기</button>
        </div>
    </div>
    <!-- [사장님/시니어 회원가입 및 로그인 선택 세그먼트 토글 분기 가동 엔진 스크립트] -->
    <script>
        let currentRole = "seeker";

        // [핵심 신설] 시니어 / 사장님 버튼 선택 시 데이터 상태를 실시간 스위칭하고 UI 글자를 동적 갱신하는 함수
        function setRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-select-btn').forEach(b => b.classList.remove('active'));
            
            if (role === 'seeker') {
                document.getElementById('roleBtnSeeker').classList.add('active');
                document.getElementById('nameLabel').innerText = "구직 베테랑 성함";
                document.getElementById('btnRegisterSubmit').innerText = "시니어 회원 가입 신청하기";
            } else {
                document.getElementById('roleBtnEmployer').classList.add('active');
                document.getElementById('nameLabel').innerText = "정식 매장 상호명";
                document.getElementById('btnRegisterSubmit').innerText = "구인 사장님 가입 신청하기";
            }
        }

        // 로그인 및 회원가입 탭 화면 전환 트랜잭션 함수
        function switchMode(mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            if (mode === 'login') {
                document.getElementById('tabL').classList.add('active');
                document.getElementById('panelLogin').classList.add('active');
            } else {
                document.getElementById('tabL').classList.remove('active');
                document.getElementById('tabR').classList.add('active');
                document.getElementById('panelRegister').classList.add('active');
            }
        }

        // 백엔드 코어 서버 디스크 DB 대조 교차 로그인 처리 함수 (권한 구분 완전 동역 직결)
        function submitLogin() {
            const id = document.getElementById('lId').value.trim();
            const pw = document.getElementById('lPw').value;
            if (!id || !pw) {
                alert('알림: 아이디와 비밀번호를 빠짐없이 기입해 주세요.');
                return;
            }

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: id, password: pw, requested_role: currentRole })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // 상용 규격 브라우저 보안 오피셜 하드 로컬 저장소 세션 영구 보존
                    localStorage.setItem('sw_username', data.user.username);
                    localStorage.setItem('sw_role', data.user.role);
                    
                    alert('인증 성공: 실버웍스 전산 보안 세션이 발급되었습니다. 마이페이지로 진입합니다.');
                    location.href = '/profile.html';
                } else { 
                    alert('인증 오류: ' + data.message); 
                }
            })
            .catch(err => {
                alert('인증 실패: 선택하신 회원 유형(시니어/사장님) 채널 정보 혹은 계정 비밀번호가 일치하지 않습니다.');
            });
        }

        // pending(승인대기) 락 잠금 상태로 물리 DB 디스크에 가입 신청 서식을 전송하는 함수
        function submitRegister() {
            const id = document.getElementById('rId').value.trim();
            const pw = document.getElementById('rPw').value;
            const nm = document.getElementById('rName').value.trim();
            const ph = document.getElementById('rPhone').value.trim();

            if (!id || !pw || !nm || !ph) {
                alert('알림: 모든 가입 서식 정보를 공백 없이 기입해 주셔야 전산망 등록이 진행됩니다.');
                return;
            }

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: id, password: pw, name: nm, phone: ph, role: currentRole })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('가입 신청서 정식 접수 완료!\n\n최고관리자 페이지(admin.html)의 마스터 신원 검증 버튼이 작동하는 즉시 로그인 진입 권한이 발급됩니다.');
                    switchMode('login');
                } else { 
                    alert('가입 신청 거부: ' + data.message); 
                }
            })
            .catch(err => {
                alert('가입 처리 오류: 데이터베이스 트랜잭션 실패');
            });
        }
    </script>
</body>
</html>
