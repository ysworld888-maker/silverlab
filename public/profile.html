<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILVERWORKS - 시니어 일자리 매칭 관제</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f9fafb; color: #111827; padding-bottom: 60px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; background-color: #ffffff; border-bottom: 1px solid #e5e8eb; position: sticky; top: 0; z-index: 100; }
        .logo-text { font-size: 20px; font-weight: 800; color: #1967d2; cursor: pointer; }
        .nav-links { display: flex; gap: 16px; align-items: center; }
        .nav-btn { background: none; border: none; font-size: 14px; font-weight: 600; color: #4b5563; cursor: pointer; text-decoration: none; }
        .nav-btn:hover { color: #1967d2; }
        
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .welcome-card { background: linear-gradient(135deg, #1967d2 0%, #1152b3 100%); color: white; padding: 30px; border-radius: 16px; margin-bottom: 24px; box-shadow: 0 4px 16px rgba(25,103,210,0.15); }
        .welcome-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .welcome-sub { font-size: 14px; opacity: 0.9; line-height: 1.5; }
        
        .section-box { background-color: #ffffff; border-radius: 12px; border: 1px solid #e5e8eb; padding: 24px; margin-bottom: 24px; }
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #111827; display: flex; justify-content: space-between; align-items: center; }
        
        .job-card { border: 1px solid #e5e8eb; border-radius: 10px; padding: 18px; margin-bottom: 14px; background-color: #ffffff; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
        .job-card:hover { border-color: #1967d2; }
        .job-info h3 { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 4px; }
        .job-info p { font-size: 13.5px; color: #4b5563; margin-bottom: 2px; }
        .wage-tag { font-size: 15px; font-weight: 800; color: #1967d2; margin-top: 6px; display: inline-block; }
        
        .btn-official { background-color: #1967d2; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        .btn-official:hover { background-color: #1152b3; }
        
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: #4b5563; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 14px; outline: none; }
        .form-input:focus { border-color: #1967d2; background-color: #f4f9ff; }
    </style>
</head>
<body>

    <header>
        <span class="logo-text" onclick="location.href='/index.html'">SILVERWORKS</span>
        <div class="nav-links">
            <button class="nav-btn" onclick="location.href='/profile.html'">마이페이지</button>
            <button class="nav-btn" onclick="location.href='/admin.html'" id="adminLink" style="display:none; color:#1967d2; font-weight:700;">관리자 콘솔</button>
            <button class="nav-btn" onclick="handleLogout()" style="color:#ef4444;">로그아웃</button>
        </div>
    </header>

    <div class="container">
        <div class="welcome-card">
            <h1 class="welcome-title" id="welcomeHeading">환영합니다!</h1>
            <p class="welcome-sub">실버웍스는 검증된 시니어 베테랑과 우수 구인 사업장을 안전하게 연결하고, 투명한 일급 정산 및 출퇴근 관제를 제공하는 전문 일자리 플랫폼입니다.</p>
        </div>

        <!-- 구인 사업장 전용 공고 등록 섹션 (사장님 로그인 시에만 노출) -->
        <div id="employerJobRegisterBox" class="section-box" style="display: none;">
            <div class="section-title">구인 사업장 맞춤 일자리 공고 등록</div>
            <form onsubmit="handleRegisterJob(event)">
                <div class="form-group">
                    <label class="form-label">매장 상호명 또는 기업명</label>
                    <input type="text" id="jobCompany" class="form-input" required placeholder="예: 강남 프리미엄 실버케어 센터">
                </div>
                <div class="form-group">
                    <label class="form-label">구인 업무 제목 및 내용 요약</label>
                    <input type="text" id="jobTitle" class="form-input" required placeholder="예: 주말 시설 안전 관리 및 안내 요원 모집">
                </div>
                <div class="form-group">
                    <label class="form-label">근무 일자 안내</label>
                    <input type="text" id="jobDate" class="form-input" required placeholder="예: 2026-07-25 (토) 09:00 ~ 18:00">
                </div>
                <div class="form-group">
                    <label class="form-label">책정 일급 임금 (원)</label>
                    <input type="number" id="jobWage" class="form-input" required placeholder="예: 120000">
                </div>
                <button type="submit" class="btn-official" style="width:100%; padding:12px; font-size:14.5px;">승인 심사 공고 등록 신청</button>
            </form>
        </div>

        <!-- 실시간 구인 공고 리드 피드 -->
        <div class="section-box">
            <div class="section-title">실시간 승인 완료된 구인 일자리 피드</div>
            <div id="jobFeedContainer">
                <p style="text-align:center; color:#6b7280; padding:20px 0;">등록된 구인 공고를 불러오는 중입니다...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadMainData();
        });

        function loadMainData() {
            fetch('/api/jobs/live-board')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('jobFeedContainer');
                    container.innerHTML = '';
                    if (!data.jobs || data.jobs.length === 0) {
                        container.innerHTML = '<p style="text-align:center; color:#6b7280; padding:20px 0; font-size:14px;">현재 진행 중인 구인 공고가 없습니다.</p>';
                        return;
                    }
                    data.jobs.forEach(j => {
                        container.innerHTML += `
                            <div class="job-card">
                                <div class="job-info">
                                    <h3>[${j.company}] ${j.title}</h3>
                                    <p>근무일자: ${j.work_date}</p>
                                    <span class="wage-tag">일급: ${j.wage.toLocaleString()}원</span>
                                </div>
                                <button class="btn-official" onclick="applyJob(${j.id})">지원 및 매칭 신청</button>
                            </div>
                        `;
                    });
                });
        }

        function handleRegisterJob(e) {
            e.preventDefault();
            const company = document.getElementById('jobCompany').value.trim();
            const title = document.getElementById('jobTitle').value.trim();
            const work_date = document.getElementById('jobDate').value.trim();
            const wage = document.getElementById('jobWage').value.trim();

            fetch('/api/jobs/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ company, title, work_date, wage })
            }).then(res => res.json()).then(data => {
                alert('구인 공고가 등록되었습니다. 관리자 승인 후 실시간 피드에 노출됩니다.');
                document.getElementById('jobCompany').value = '';
                document.getElementById('jobTitle').value = '';
                document.getElementById('jobDate').value = '';
                document.getElementById('jobWage').value = '';
                loadMainData();
            });
        }

        function applyJob(jobId) {
            alert(`매칭 신청 완료! 공고 번호 #${jobId}에 대한 지원서가 접수되었습니다.`);
        }

        function handleLogout() {
            fetch('/api/auth/login', { method: 'POST' }).then(() => {
                location.href = '/login.html';
            });
        }
    </script>
</body>
</html>
