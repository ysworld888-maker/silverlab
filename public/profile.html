<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 프로필 피드</title>
    <!-- [인프라 대격변] 인스타그램 미학과 평판 시스템, 개인 자율 피드 엔진이 통합 결속된 상용 CSS 명세 -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #ffffff; color: #262626; padding-bottom: 60px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background-color: #ffffff; border-bottom: 1px solid #dbdbdb; position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-text { font-size: 20px; font-weight: 800; color: #1967d2; letter-spacing: -0.5px; }
        .container { max-width: 935px; margin: 0 auto; padding: 30px 20px; }
        
        /* 인스타그램 오피셜 프로필 헤드 구역 UI 아키텍처 */
        .insta-profile-header { display: flex; align-items: center; margin-bottom: 44px; gap: 40px; border-bottom: 1px solid #efefef; padding-bottom: 44px; }
        @media (max-width: 735px) { .insta-profile-header { gap: 20px; margin-bottom: 24px; padding-bottom: 24px; } }
        .avatar-circle-zone { flex-shrink: 0; width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 3px; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 735px) { .avatar-circle-zone { width: 90px; height: 90px; } }
        .avatar-inner { width: 100%; height: 100%; border-radius: 50%; background-color: #1967d2; border: 4px solid #ffffff; color: #ffffff; font-size: 42px; font-weight: 800; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        @media (max-width: 735px) { .avatar-inner { font-size: 24px; border-width: 2px; } }
        
        .profile-info-column { flex-grow: 1; }
        .info-username-row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .info-username { font-size: 28px; font-weight: 300; color: #262626; }
        
        /* 인스타그램 3대 지표 트래커 시스템 (피드 수, 평판 지수, 구직 횟수) */
        .info-stats-row { display: flex; gap: 40px; margin-bottom: 20px; font-size: 16px; }
        .stat-item { color: #262626; }
        .stat-item span { font-weight: 600; color: #1967d2; }
        .profile-bio-text { font-size: 16px; line-height: 1.5; font-weight: 400; color: #262626; }
        .profile-bio-text strong { font-weight: 600; display: block; margin-bottom: 4px; }
        /* 인스타그램 감성 탭 메뉴 및 그리드 보드 아키텍처 */
        .insta-tabs-nav { display: flex; justify-content: center; border-top: 1px solid #dbdbdb; gap: 60px; }
        .insta-tab-item { background: none; border: none; padding: 18px 0; font-size: 12px; font-weight: 600; color: #8e8e8e; cursor: pointer; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; border-top: 1px solid transparent; margin-top: -1px; text-transform: uppercase; }
        .insta-tab-item.active { color: #262626; border-top: 1px solid #262626; }
        
        .feed-content-zone { display: none; margin-top: 24px; }
        .feed-content-zone.active { display: block; }
        
        /* 세련된 카드형 피드 및 리뷰 디자인 스펙 */
        .info-card { background-color: #ffffff; border-radius: 12px; border: 1px solid #dbdbdb; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        .card-header-title { font-size: 15px; font-weight: 700; color: #262626; margin-bottom: 16px; border-bottom: 1px solid #efefef; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: #4e5968; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #dbdbdb; font-size: 14px; font-weight: 500; color: #262626; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: #a8a8a8; }
        .form-textarea { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #dbdbdb; font-size: 14px; font-weight: 500; color: #262626; outline: none; resize: none; height: 100px; transition: border-color 0.2s; }
        .form-textarea:focus { border-color: #a8a8a8; }
        
        /* 오션 블루 오피셜 규격 및 인스타 감성 제어 단추 시스템 */
        .btn-official-blue { width: 100%; background-color: #1967d2; color: #ffffff; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; transition: opacity 0.2s; }
        .btn-official-blue:hover { opacity: 0.9; }
        .btn-mini-danger { background-color: #ffffff; color: #ed4956; border: 1px solid #dbdbdb; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn-mini-danger:hover { background-color: #fafafa; }
        .btn-mini-blue { background-color: #1967d2; color: #ffffff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        
        /* 피드 아이템 레이아웃 구조 */
        .feed-list-wrapper { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .single-feed-box { border: 1px solid #dbdbdb; border-radius: 12px; background: #ffffff; overflow: hidden; }
        .feed-box-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid #efefef; }
        .feed-box-user { font-size: 14px; font-weight: 600; color: #262626; }
        .feed-box-body { padding: 16px; font-size: 14.5px; line-height: 1.6; color: #262626; }
        .feed-box-img-placeholder { width: 100%; height: 250px; background-color: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #8e8e8e; font-weight: 600; border-bottom: 1px solid #efefef; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* 평판 리뷰 리스트 양식 스펙 */
        .review-comment-item { padding: 14px 16px; border-bottom: 1px solid #efefef; font-size: 14px; line-height: 1.5; }
        .review-comment-item:last-child { border-bottom: none; }
        .review-author { font-weight: 600; color: #262626; margin-right: 8px; }
        .review-score-badge { display: inline-block; background-color: #e8f3ff; color: #1967d2; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 6px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href='/'">
            <svg width="24" height="22" viewBox="0 0 100 90" fill="none" xmlns="http://w3.org">
                <path d="M12.5 54C13.5 53 19.5 54.5 28.5 48.5C38.5 42 47 28 56.5 19.5C65.5 11 76.5 6.5 85.5 12.5C95.5 18.5 90 32 81 37C69.5 41.5 61 33 53 41.5C43 51 28.5 63 17 61C10 59.5 6.5 53 12.5 54Z" stroke="#1967d2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M51.5 59C58.5 67 71 68 80.5 60.5C90 53 92.5 39.5 85.5 32" stroke="#1967d2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">SILVERWORKS</span>
        </div>
        <button type="button" class="btn-mini-blue" onclick="location.href='/board.html'">매칭 게시판</button>
    </header>
    <div class="container">
        <!-- 인스타그램 오피셜 프로필 상단 신원 명세판 구역 -->
        <div class="insta-profile-header">
            <div class="avatar-circle-zone">
                <div class="avatar-inner" id="mAvatar">-</div>
            </div>
            <div class="profile-info-column">
                <div class="info-username-row">
                    <h2 class="info-username" id="mId">-</h2>
                </div>
                <!-- 인스타그램 3대 핵심 지표 트래커 시스템 (피드, 평판점수, 구직횟수) -->
                <div class="info-stats-row">
                    <div class="stat-item">게시물 <span id="statFeedCount">0</span></div>
                    <div class="stat-item">평판 평점 <span id="statRepScore">5.0</span></div>
                    <div class="stat-item">매칭 계약 <span id="statMatchCount">1</span></div>
                </div>
                <div class="profile-bio-text">
                    <strong id="mName">-</strong>
                    <span id="mBioRole">실버웍스 인증 마스터</span><br>
                    <span id="mPhone" style="color:#6b7684; font-size:14px;">-</span>
                </div>
            </div>
        </div>

        <!-- 인스그램 피드 스위칭용 상용 탭 메뉴 링크선 -->
        <div class="insta-tabs-nav">
            <button type="button" id="tabFeed" class="insta-tab-item active" onclick="switchInstaTab('feed')">게시물</button>
            <button type="button" id="tabReview" class="insta-tab-item" onclick="switchInstaTab('review')">평판 리뷰 피드</button>
            <button type="button" id="tabSettle" class="insta-tab-item" id="tabSettleBtn" style="display:none;" onclick="switchInstaTab('settle')">일급 정산소</button>
        </div>

        <!-- 탭 1 구역: 개인 자율 피드 업로드 에디터 및 피드 보드 리스트 -->
        <div id="zoneFeed" class="feed-content-zone active">
            <div class="info-card" id="myFeedEditorBox">
                <div class="card-header-title">새로운 현장 근로 피드 배포하기</div>
                <div class="form-group">
                    <label class="form-label">오늘의 현장 근로 내용 및 다짐 소회</label>
                    <textarea id="feedText" class="form-textarea" placeholder="오늘 매장에서 수고하신 근로 소회나 다짐 피드를 자유롭게 기록해 보세요."></textarea>
                </div>
                <button type="button" class="btn-official-blue" onclick="handleCreateMyFeed()">실시간 개인 피드 배포 적재</button>
            </div>
            <div class="card-header-title" style="margin-bottom:14px; border:none;">베테랑 공식 피드 보드</div>
            <div id="myFeedListContainer" class="feed-list-wrapper"></div>
        </div>

        <!-- 탭 2 구역: 타 사장님 회원들이 기입 누적해 줄 평판 리뷰 피드 보드 -->
        <div id="zoneReview" class="feed-content-zone">
            <div class="info-card" id="employerReviewEditorBox" style="display:none; border: 2px solid #1967d2;">
                <div class="card-header-title" style="color:#1967d2;">금일 파견 베테랑 회원 평판도 한 줄 검증서 기입</div>
                <div class="form-group">
                    <label class="form-label">부여할 평판 신용 점수 (1점 ~ 5점 자율 배정)</label>
                    <input type="number" id="revScore" class="form-input" min="1" max="5" value="5">
                </div>
                <div class="form-group">
                    <label class="form-label">사장님 관점의 진짜 한 줄 평가 피드백</label>
                    <input type="text" id="revText" class="form-input" placeholder="예: 무단 노쇼 없이 시간 약속을 칼날같이 엄수해 주셨고 친절하십니다.">
                </div>
                <button type="button" class="btn-official-blue" onclick="handleCreateRepReview()">평판 신용 보증서 실시간 제출</button>
            </div>
            <div class="info-card" style="padding:0;">
                <div class="card-header-title" style="padding:20px 24px 10px 24px; border-bottom:1px solid #efefef;">타 회원 평판 검증 피드백 로그</div>
                <div id="reviewListContainer"></div>
            </div>
        </div>

        <!-- 탭 3 구역: 구인 사장님 전용 확정자 일급 정산 및 출퇴근 관제 기제소 -->
        <div id="zoneSettle" class="feed-content-zone">
            <div class="info-card">
                <div class="card-header-title">우리 매장 공고별 정식 지원 베테랑 명단 (1대1 독점 격리 관제)</div>
                <button type="button" class="btn-official-blue" style="margin-bottom:14px;" onclick="loadBossApplicants(1)">내 공고 실시간 지원자 데이터 파싱 및 1/2/3순위 관제 가동</button>
                <div id="applicantBox" style="margin-top:12px; display:none; border-top:1px solid #f2f4f6; padding-top:4px;"></div>
            </div>
        </div>
    <!-- [오션블루 인스타 미학 피드 가동 및 평판 점수 누적 실시간 계산 통계 스크립트 엔진 1단] -->
    <script>
        let currentUserId = ""; // 현재 로그인한 사용자 ID
        let targetProfileId = ""; // 현재 조회 중인 프로필의 대상 ID

        document.addEventListener("DOMContentLoaded", function() {
            currentUserId = localStorage.getItem('sw_username');
            const role = localStorage.getItem('sw_role');
            
            if (!currentUserId) { location.href = '/login.html'; return; }

            // 주소창 파라미터 파싱 유기 연동 (?username=아이디 형식으로 타인 피드 조회 가능하도록 인프라 유도)
            const urlParams = new URLSearchParams(window.location.search);
            targetProfileId = urlParams.get('username') || currentUserId;

            // 로컬 스토리지에 자율 적재 시뮬레이션할 피드 및 리뷰 원천 데이터 초기화 트리거
            if(!localStorage.getItem('sw_feeds_db')) {
                localStorage.setItem('sw_feeds_db', JSON.stringify([
                    { id: 1, username: targetProfileId, text: "주말 오픈 오픈 멤버로 출근 완료했습니다! 손님들을 환한 미소로 맞이하겠습니다.", created_at: "2026.07.20" }
                ]));
            }
            if(!localStorage.getItem('sw_reviews_db')) {
                localStorage.setItem('sw_reviews_db', JSON.stringify([
                    { id: 1, target: targetProfileId, author: "employer1", text: "무단 노쇼 없이 시간 약속을 칼날같이 엄수해 주셨고 친절하십니다.", score: 5 }
                ]));
            }

            fetch('/api/profile/me?username=' + encodeURIComponent(targetProfileId)).then(res => res.json()).then(data => {
                const p = data.profile;
                document.getElementById('mId').innerText = p.username;
                document.getElementById('mName').innerText = p.name;
                document.getElementById('mPhone').innerText = p.phone;
                document.getElementById('mAvatar').innerText = p.username.substring(0, 2);
                
                // 내가 내 프로필을 보고 있으며 + 'employer(구인 사장님)' 세션 등급일 때만 일급 정산 탭 및 공고 파싱 제어반 표출
                if (currentUserId === targetProfileId && role === 'employer') {
                    document.getElementById('tabSettle').style.style.display = 'flex';
                    document.getElementById('mBioRole').innerText = "구인 사업장 공식 사장님 제어 세션";
                }

                // 타인 사장님이 구직 시니어의 피드에 접근했을 때는 평판 작성 에디터 박스를 활짝 엽니다.
                if (currentUserId !== targetProfileId && role === 'employer') {
                    document.getElementById('employerReviewEditorBox').style.display = 'block';
                }

                // 本인 프로필이 아닐 경우에는 피드 기입 편집 창을 엄격 은폐 숨김 처리합니다.
                if (currentUserId !== targetProfileId) {
                    document.getElementById('myFeedEditorBox').style.display = 'none';
                }

                renderLocalFeedsAndReviews();
            });
        });

        // 인스타그램 상단 탭 스위칭 제어 모듈 함수
        function switchInstaTab(type) {
            document.querySelectorAll('.insta-tab-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.feed-content-zone').forEach(z => z.classList.remove('active'));
            
            if (type === 'feed') {
                document.getElementById('tabFeed').classList.add('active');
                document.getElementById('zoneFeed').classList.add('active');
            } else if (type === 'review') {
                document.getElementById('tabReview').classList.add('active');
                document.getElementById('zoneReview').classList.add('active');
            } else {
                document.getElementById('tabSettle').classList.add('active');
                document.getElementById('zoneSettle').classList.add('active');
            }
        }
        // [핵심 로직 자율 적재 제어 기능] 로컬 스토리지를 물리 디스크 창고 삼아 피드와 평판 리뷰 실시간 렌더링 출력
        function renderLocalFeedsAndReviews() {
            const feedContainer = document.getElementById('myFeedListContainer');
            const reviewContainer = document.getElementById('reviewListContainer');
            
            const feeds = JSON.parse(localStorage.getItem('sw_feeds_db')) || [];
            const reviews = JSON.parse(localStorage.getItem('sw_reviews_db')) || [];

            // 1. 해당 유저 아이디와 매핑 결속된 개인 자율 피드 필터링 바인딩 출력
            const myFeeds = feeds.filter(f => f.username === targetProfileId);
            document.getElementById('statFeedCount').innerText = myFeeds.length;
            feedContainer.innerHTML = '';

            if(myFeeds.length === 0) {
                feedContainer.innerHTML = '<p style="text-align:center; color:#8e8e8e; padding:30px 0; font-size:14px;">등록된 게시물이 없습니다.</p>';
            } else {
                myFeeds.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'single-feed-box';
                    const actionGroup = (currentUserId === f.username) 
                        ? `<button class="btn-mini-danger" style="margin-right:6px;" onclick="handleDeleteFeed(${f.id})">삭제</button>
                           <button class="btn-mini-blue" onclick="handleUpdateFeed(${f.id})">수정</button>` 
                        : '';

                    div.innerHTML = `
                        <div class="feed-box-header">
                            <span class="feed-box-user">${f.username}</span>
                            <div>${actionGroup}</div>
                        </div>
                        <div class="feed-box-img-placeholder">SILVERWORKS LIVE FEED DATA</div>
                        <div class="feed-box-body">${f.text}</div>
                    `;
                    feedContainer.appendChild(div);
                });
            }

            // 2. 타 회원 평판 검증 피드백 분석 계산 및 출력 파싱
            const targetReviews = reviews.filter(r => r.target === targetProfileId);
            reviewContainer.innerHTML = '';
            
            if(targetReviews.length === 0) {
                reviewContainer.innerHTML = '<p style="text-align:center; color:#8e8e8e; padding:20px 0; font-size:14px;">아직 누적된 타 회원 평판 검증서가 없습니다.</p>';
                document.getElementById('statRepScore').innerText = "5.0";
            } else {
                let sum = 0;
                targetReviews.forEach(r => {
                    sum += r.score;
                    reviewContainer.innerHTML += `
                        <div class="review-comment-item">
                            <span class="review-author">${r.author}</span> ${r.text}
                            <span class="review-score-badge">평판점수 ${r.score}점</span>
                        </div>
                    `;
                });
                const avgScore = (sum / targetReviews.length).toFixed(1);
                document.getElementById('statRepScore').innerText = avgScore;
            }
        }

        // 개인 자율 피드 실시간 업로드 가동 함수
        function handleCreateMyFeed() {
            const txt = document.getElementById('feedText').value.trim();
            if(!txt) { alert('내용을 기입하세요.'); return; }
            
            const feeds = JSON.parse(localStorage.getItem('sw_feeds_db')) || [];
            feeds.push({ id: Date.now(), username: currentUserId, text: txt, created_at: "2026.07.22" });
            localStorage.setItem('sw_feeds_db', JSON.stringify(feeds));
            
            alert('인스타그램 스타일 개인 피드 배포 적재 대성공!');
            document.getElementById('feedText').value = '';
            renderLocalFeedsAndReviews();
        }

        // 개인 자율 피드 수정 처리 함수
        function handleUpdateFeed(feedId) {
            const newText = prompt('수정할 새로운 피드 내용을 입력해 주세요:');
            if(!newText || !newText.trim()) return;

            let feeds = JSON.parse(localStorage.getItem('sw_feeds_db')) || [];
            feeds = feeds.map(f => f.id === feedId ? { ...f, text: newText.trim() } : f);
            localStorage.setItem('sw_feeds_db', JSON.stringify(feeds));
            
            alert('피드 수정 사항이 정상 반영되었습니다.');
            renderLocalFeedsAndReviews();
        }

        // 개인 자율 피드 삭제 처리 함수
        function handleDeleteFeed(feedId) {
            if(!confirm('정말로 이 피드 게시물을 전산 소멸 삭제하시겠습니까?')) return;
            
            let feeds = JSON.parse(localStorage.getItem('sw_feeds_db')) || [];
            feeds = feeds.filter(f => f.id !== feedId);
            localStorage.setItem('sw_feeds_db', JSON.stringify(feeds));
            
            alert('피드가 물리 디스크에서 삭제되었습니다.');
            renderLocalFeedsAndReviews();
        }

        // 사장님이 타인의 프로필에 평판 신용 서식을 주입 제출하는 함수
        function handleCreateRepReview() {
            const score = parseInt(document.getElementById('revScore').value) || 5;
            const text = document.getElementById('revText').value.trim();
            
            if(!text) { alert('평판 피드백 문장을 기입해 주세요.'); return; }
            
            const reviews = JSON.parse(localStorage.getItem('sw_reviews_db')) || [];
            reviews.push({ id: Date.now(), target: targetProfileId, author: currentUserId, text: text, score: score });
            localStorage.setItem('sw_reviews_db', JSON.stringify(reviews));
            
            alert('평판 신용 보증서 제출 및 누적 통계 연동 대성공!');
            document.getElementById('revText').value = '';
            renderLocalFeedsAndReviews();
        }

        // [확정하기 오더 기능 연동] 내 매장 공고 지원 베테랑 명단 파싱 렌더 가동
        function loadBossApplicants(jobId) {
            const box = document.getElementById('applicantBox');
            fetch(`/api/employer/applicants?employer_id=${currentUserId}&job_id=${jobId}`).then(res => res.json()).then(data => {
                box.innerHTML = '<h5 style="color:#1967d2; font-size:14px; margin-bottom:12px; font-weight:700;">접수 완료된 지원자 리스트</h5>'; box.style.display = 'block';
                if(!data.data || data.data.length === 0) { box.innerHTML += '<p style="font-size:13px; color:#6b7684; text-align:center; padding:20px 0;">현재 접수된 구직 지원 원서가 없습니다.</p>'; return; }
                
                data.data.forEach(item => {
                    const s = item.seeker_info;
                    const r = item.rank_priority;
                    const isConfirmed = item.status === 'confirmed';
                    const div = document.createElement('div');
                    div.className = 'applicant-card';
                    
                    const displayPhone = isConfirmed ? s.phone : "고용 확정 시 공개됩니다";
                    const actionBtn = isConfirmed 
                        ? `<a class="btn-work-warp" href="/work.html?job_id=${jobId}&seeker_id=${s.username}">출퇴근/포인트 정산소 진입 ➔</a>`
                        : `<button type="button" class="btn-confirm-action" onclick="confirmPartner(${jobId}, '${s.username}')">고용 후보자 확정하기</button>`;
                    
                    div.innerHTML = `
                        <div class="applicant-name">지원 구직자: <a href="/profile.html?username=${s.username}" style="color:#1967d2; font-weight:700; text-decoration:none;">${s.name} 베테랑 프로필 피드 구경 ➔</a></div>
                        <div class="applicant-meta">실물 연락처 명세: <span style="color:#1967d2;">${displayPhone}</span></div>
                        <div class="applicant-meta">국민체력100 등급: <span>${s.fitness_grade || '미인증'}</span> | 악력: ${s.fitness_grip || '-'}kg</div>
                        <div class="rank-action-group">
                            <div class="rank-row-line">
                                <div class="rank-group-title">우선순위 지망 배정:</div>
                                <button type="button" class="btn-rank ${r===1?'active-rank':''}" onclick="assignPriority(${jobId}, '${s.username}', 1)">1순위</button>
                                <button type="button" class="btn-rank ${r===2?'active-rank':''}" onclick="assignPriority(${jobId}, '${s.username}', 2)">2순위</button>
                                <button type="button" class="btn-rank ${r===3?'active-rank':''}" onclick="assignPriority(${jobId}, '${s.username}', 3)">3순위</button>
                            </div>
                            <div class="rank-row-line" style="margin-top:4px; padding-top:8px; border-top:1px dashed #f2f4f6; justify-content:flex-end; width:100%;">
                                ${actionBtn}
                            </div>
                        </div>
                    `;
                    box.appendChild(div);
                });
            });
        }

        function confirmPartner(jobId, seekerId) {
            if(!confirm('선택하신 시니어 베테랑 회원을 최종 확정합니까?')) return;
            fetch('/api/employer/confirm-seeker', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ job_id: jobId, seeker_id: seekerId }) }).then(() => {
                alert('고용 계약 결속 대성공!'); loadBossApplicants(jobId);
            });
        }

        function assignPriority(jobId, seekerId, rankNum) {
            fetch('/api/employer/update-rank', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ job_id: jobId, seeker_id: seekerId, rank_priority: rankNum }) }).then(() => {
                alert(`지망 배정 성공! [${rankNum}순위]`); loadBossApplicants(jobId);
            });
        }

        function handleOfficialLogout() { localStorage.clear(); alert('보안 세션 파쇄 완료.'); location.href = '/'; }
    </script>
</body>
</html>
