<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 회원 신원 프로필</title>
    <!-- [인프라 정화] 오직 파란색과 하얀색 단일 테마 가이드셋 주입 상용 CSS 명세 -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #ffffff; color: #0f1419; padding: 20px; display: flex; justify-content: center; }
        .profile-wrap-box { width: 100%; max-width: 500px; padding: 24px; border: 1px solid #eff3f4; border-radius: 16px; background-color: #ffffff; }
        
        .logo-center { text-align: center; margin-bottom: 16px; cursor: pointer; }
        .main-title { font-size: 20px; font-weight: 800; text-align: center; color: #1967d2; margin-bottom: 24px; }
        
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f7f9fa; font-size: 14.5px; }
        .info-label { font-weight: 700; color: #536471; }
        .info-value { font-weight: 700; color: #0f1419; }
        .info-value.blue { color: #1967d2; }
        .info-value.point { color: #00c73c; }

        /* [요구사항 1번 신설] 시니어 회원인 경우 하단에 투명하게 출력될 12단계 문진표 전용 카드 디자인 */
        .qa-display-card { margin-top: 24px; border-top: 2px dashed #eff3f4; padding-top: 18px; display: none; }
        .qa-card-title { font-size: 15px; font-weight: 800; color: #1967d2; margin-bottom: 12px; }
        .qa-item-box { margin-bottom: 10px; background-color: #f4f9ff; padding: 12px; border-radius: 10px; border: 1px solid #e8f3ff; }
        .qa-item-q { font-size: 11.5px; font-weight: 700; color: #536471; margin-bottom: 4px; }
        .qa-item-a { font-size: 13.5px; font-weight: 700; color: #1967d2; }

        .btn-home-blue { width: 100%; background-color: #1967d2; color: #ffffff; border: none; padding: 13px; border-radius: 9999px; font-size: 14.5px; font-weight: 700; cursor: pointer; text-align: center; margin-top: 20px; transition: background-color 0.2s; }
        .btn-home-blue:hover { background-color: #1152b3; }
    </style>
</head>
<body>
    <div class="profile-wrap-box">
        <div class="logo-center" onclick="location.href='/'">
            <svg width="36" height="34" viewBox="0 0 100 90" fill="none">
                <path d="M12.5 54C13.5 53 19.5 54.5 28.5 48.5C38.5 42 47 28 56.5 19.5C65.5 11 76.5 6.5 85.5 12.5" stroke="#1967d2" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M51.5 59C58.5 67 71 68 80.5 60.5C90 53 92.5 39.5 85.5 32" stroke="#1967d2" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <h2 class="main-title">실버웍스 회원 원장 프로필</h2>
        
        <div id="profileLoading" style="text-align:center; padding:20px 0; color:#536471; font-weight:700;">전산망 프로필 데이터를 로드 중입니다...</div>
        
        <div id="profileMainContent" style="display: none;">
            <div class="info-row"><span class="info-label">사용자 아이디 (ID)</span><span class="info-value blue" id="pUsername"></span></div>
            <div class="info-row"><span class="info-label">정식 회원 실명/상호명</span><span class="info-value" id="pName"></span></div>
            <div class="info-row"><span class="info-label">정식 등록 전화번호 명세</span><span class="info-value blue" id="pPhone"></span></div>
            <div class="info-row"><span class="info-label">회원 권한 등급 분류</span><span class="info-value" id="pRole"></span></div>
            <div class="info-row"><span class="info-label">체력 인증 종합 등급</span><span class="info-value" id="pFitnessGrade"></span></div>
            <div class="info-row"><span class="info-label">전자 포인트 보유 잔액</span><span class="info-value point" id="pPoints"></span></div>
            
            <!-- [요구사항 1번] 시니어 회원인 경우에만 동적으로 가동 개방 노출될 12단계 건강 문진 원장 사본 피드 -->
            <div id="seniorQaSection" class="qa-display-card">
                <h3 class="qa-card-title">📄 구직 베테랑 12단계 정밀 건강 문진표 이력서 원장</h3>
                <div id="qaItemsBox"></div>
            </div>
        </div>
        
        <button type="button" class="btn-home-blue" onclick="location.href='/'">대문 메인 광장 복귀</button>
    </div>

    <!-- [누구나 투명 열람 가능한 시니어 문진 파싱 자바스크립트 엔진] -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const myId = localStorage.getItem('sw_username');
            if(!myId) {
                alert('알림: 정식 회원만 접근 가능한 보안 채널입니다. 로그인 창으로 워프합니다.');
                location.href = '/login.html';
                return;
            }

            // URL 파라미터에서 조회할 대상 아이디(?username=id)를 추출, 없으면 로그인한 내 계정 자동 바인딩
            const urlParams = new URLSearchParams(window.location.search);
            let targetUser = urlParams.get('username');
            if (!targetUser) targetUser = myId;

            fetch('/api/profile/me?username=' + encodeURIComponent(targetUser))
                .then(res => res.json())
                .then(data => {
                    if (!data.success || !data.profile) {
                        document.getElementById('profileLoading').innerText = "존재하지 않거나 전산이 잠겨있는 계정 원장입니다.";
                        return;
                    }

                    const u = data.profile;
                    document.getElementById('profileLoading').style.display = 'none';
                    document.getElementById('profileMainContent').style.display = 'block';

                    document.getElementById('pUsername').innerText = `@${u.username}`;
                    document.getElementById('pName').innerText = u.name;
                    document.getElementById('pPhone').innerText = u.phone;
                    document.getElementById('pRole').innerText = u.role === 'employer' ? '구인 사장님 회원 (employer)' : '구직 시니어 회원 (seeker)';
                    document.getElementById('pFitnessGrade').innerText = u.fitness_grade || '미인증';
                    document.getElementById('pPoints').innerText = `${(u.points || 0).toLocaleString()} P`;

                    // [핵심 요구 완벽 이식] 누구나 볼 수 있게 권한을 전면 해제하고 시니어 회원인 경우에만 12단계 문진표 동적 출력 가동
                    if (u.role === 'seeker') {
                        document.getElementById('seniorQaSection').style.display = 'block';
                        const box = document.getElementById('qaItemsBox');
                        box.innerHTML = '';

                        const qLabels = [
                            "조력자 구분 명세 (자신 작성 또는 대리인)", "구직 베테랑 성함 명세", "생년월일 명세 (예: 1955년생)", 
                            "휴대폰 번호 연락처 명세", "근무 희망 동네 지역 명세", "3층 계단 보행력 지표 상태", 
                            "1시간 연속 도보 가능성 여부", "현장 주의가 필요한 지병 데이터", "식당 및 마트 청력 소통도 유무", 
                            "카카오톡 메시지 원활 활용도", "초단기(하루 3시간) 근로 수용성", "정부 노인일자리 중복참여 이력"
                        ];

                        const qa = data.senior_answers;
                        if (qa) {
                            const answers = [qa.q1, qa.q2, qa.q3, qa.q4, qa.q5, qa.q6, qa.q7, qa.q8, qa.q9, qa.q10, qa.q11, qa.q12];
                            qLabels.forEach((label, i) => {
                                box.innerHTML += `
                                    <div class="qa-item-box">
                                        <div class="qa-item-q">문항 ${i+1}. ${label}</div>
                                        <div class="qa-item-a">${answers[i] || '미기입 공백 상태'}</div>
                                    </div>`;
                            });
                        } else {
                            box.innerHTML = `<p style="font-size:13px; color:#536471; padding:10px 0; text-align:center;">알림: 해당 구직 회원은 아직 12단계 건강 문진서를 기입 제출하지 않은 상태입니다.</p>`;
                        }
                    }
                });
        });
    </script>
</body>
</html>
