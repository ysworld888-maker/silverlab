<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 사장님 혁신 센터</title>
    <!-- 혼선 유도 색상을 차단하고 오션 블루 테마와 세련된 그레이 톤으로 일괄 정렬 통합한 스타일셋 -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f9fafb; color: #333d4b; padding-bottom: 60px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background-color: #ffffff; border-bottom: 1px solid #f2f4f6; position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-text { font-size: 20px; font-weight: 800; color: #1967d2; letter-spacing: -0.5px; }
        .container { max-width: 650px; margin: 0 auto; padding: 40px 24px; }
        .title { font-size: 24px; font-weight: 700; color: #1b1c1e; margin-bottom: 8px; letter-spacing: -0.5px; }
        .sub { font-size: 14px; color: #6b7684; margin-bottom: 30px; line-height: 1.5; }
        .info-card { background-color: #ffffff; border-radius: 16px; border: 1px solid #e5e8eb; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.01); }
        .card-title { font-size: 16px; font-weight: 700; color: #333d4b; margin-bottom: 16px; border-bottom: 1px solid #f2f4f6; padding-bottom: 10px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13.5px; font-weight: 600; color: #4e5968; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #d1d6db; font-size: 14.5px; font-weight: 600; color: #1b1c1e; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: #1967d2; background-color: #f4f9ff; }
        /* 오션 블루 오피셜 상용 버튼 디자인 시스템 규격 일괄 통일 */
        .btn-official-blue { width: 100%; background-color: #1967d2; color: #ffffff; padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; transition: opacity 0.2s; }
        .btn-official-blue:hover { opacity: 0.9; }
        .btn-mini-blue { background-color: #1967d2; color: #ffffff; border: none; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-mini-blue:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href='/'">
            <svg width="28" height="26" viewBox="0 0 100 90" fill="none" xmlns="http://w3.org">
                <path d="M12.5 54C13.5 53 19.5 54.5 28.5 48.5C38.5 42 47 28 56.5 19.5C65.5 11 76.5 6.5 85.5 12.5C95.5 18.5 90 32 81 37C69.5 41.5 61 33 53 41.5C43 51 28.5 63 17 61C10 59.5 6.5 53 12.5 54Z" stroke="#1967d2" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M51.5 59C58.5 67 71 68 80.5 60.5C90 53 92.5 39.5 85.5 32" stroke="#1967d2" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">SILVERWORKS</span>
        </div>
        <button class="btn-mini-blue" onclick="location.href='/login.html?type=employer'">사장님 가입 및 로그인 ➔</button>
    </header>

    <div class="container">
        <h1 class="title">구인 사장님 혁신 비즈니스 센터</h1>
        <p class="sub">피크타임 고용 지출 예산을 실시간 시뮬레이션하고, 관제실 행정 대리인과 1대1 무결점 소통을 거쳐 공고 승인 권한 락을 해제하는 인프라 공간입니다.</p>

        <!-- [기획 요건 완벽 부활] 주휴수당 연동형 인건비 모의 계산기 패널 (버튼 디자인 일괄 통일) -->
        <div class="info-card">
            <div class="card-title">실시간 피크타임 인건비 및 법정 주휴수당 모의 계산기</div>
            <div class="form-group">
                <label class="form-label">소정 약정 기본 시급 (원)</label>
                <input type="number" id="calcWage" class="form-input" value="10030" oninput="runFinanceCalculate()">
            </div>
            <div class="form-group">
                <label class="form-label">주간 집중 구인 설정 시간 (시간)</label>
                <input type="number" id="calcHours" class="form-input" value="15" placeholder="주 15시간 미만 구인 시 주휴수당 면제" oninput="runFinanceCalculate()">
            </div>
            <div style="background-color:#f8f9fa; padding:16px; border-radius:10px; margin-bottom:16px; font-size:14px; line-height:1.6;">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px;"><span>기본 소정 근로 임금 총액:</span><span id="resBase" style="font-weight:700;">0 원</span></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:6px; color:#1967d2;"><span>주 15시간 이상 주휴수당 가산액:</span><span id="resExtra" style="font-weight:700;">0 원</span></div>
                <div style="display:flex; justify-content:space-between; padding-top:6px; border-top:1px solid #e5e8eb; font-size:15px; font-weight:700; color:#1152b3;"><span>월간 예상 총 인건비 예산 지출액:</span><span id="resTotal">0 원</span></div>
            </div>
            <button type="button" class="btn-official-blue" onclick="runFinanceCalculate()">인건비 자동 산식 실행하기</button>
        </div>
        <!-- [기획 요건 완벽 부활] 자사 전용 1대1 다이렉트 전산 행정 상담원 채널 패널 -->
        <div class="info-card">
            <div class="card-title">실버웍스 자사 전용 1대1 다이렉트 전산 행정 상담원 채널</div>
            <div class="form-group">
                <label class="form-label">매장명, 상담하시는 전화번호를 기입해 주세요.</label>
                <input type="text" id="consultTitle" class="form-input" placeholder="예: 구인 정보 법정 등록 서식 보완 문의">
            </div>
            <div class="form-group">
                <label class="form-label">상세 문의 사항 기입</label>
                <textarea id="consultDesc" class="form-input" style="height:100px; resize:none; font-family:sans-serif;" placeholder="내용을 상세히 입력해 주시면 24시간 이내에 전산 관제실에서 연락해 드립니다."></textarea>
            </div>
            <button type="button" class="btn-official-blue" onclick="submitConsultAction()">1대1 상담 접수하기</button>
        </div>
    </div>

    <!-- [주휴수당 산식 수학 알고리즘 및 전산 상담 통신 가동 엔진 스크립트] -->
    <script>
        // 1. 고용노동부 근로기준법 전산 규격을 바탕으로 설계된 주휴수당 자동 산식 연동 로직
        function runFinanceCalculate() {
            const wage = parseInt(document.getElementById('calcWage').value) || 0;
            const hours = parseFloat(document.getElementById('calcHours').value) || 0;
            
            // 한 달 근로 일수 한계치 통계 배율인 4.345주를 기준으로 기본급 계산
            const baseWage = Math.floor(wage * hours * 4.345);
            let extraWage = 0;
            
            // 법정 근로기준법 적용: 주 15시간 이상 집중 근로 구인 시 주휴수당 자동 산입 연동
            if (hours >= 15) {
                extraWage = Math.floor((hours / 40) * 8 * wage * 4.345);
            }
            
            document.getElementById('resBase').innerText = baseWage.toLocaleString() + " 원";
            document.getElementById('resExtra').innerText = extraWage.toLocaleString() + " 원";
            document.getElementById('resTotal').innerText = (baseWage + extraWage).toLocaleString() + " 원";
        }

        // 2. 상담 요청 기입 수치 실시간 가로채기 통신 함수
        function submitConsultAction() {
            const tit = document.getElementById('consultTitle').value.trim();
            if(!tit) { 
                alert('상담 요약 제목을 입력해 주세요.'); 
                return; 
            }
            alert('상담 신청 접수 완료!\n\n작성하신 행정 문의 데이터가 실버웍스 마스터 관제 장치로 실시간 직결 전송되었습니다. 24시간 이내에 전산망 안내 통보를 대기해 주세요.');
            document.getElementById('consultTitle').value = ''; 
            document.getElementById('consultDesc').value = '';
        }

        // 페이지 최초 마운트 로딩 즉시 초기 산식 시뮬레이션 가동
        runFinanceCalculate();
    </script>
</body>
</html>
