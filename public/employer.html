<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 사장님 혁신 센터</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f9fafb; color: #333d4b; padding-bottom: 60px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background-color: #ffffff; border-bottom: 1px solid #f2f4f6; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-text { font-size: 20px; font-weight: 800; color: #1967d2; }
        .container { max-width: 650px; margin: 0 auto; padding: 40px 24px; }
        .title { font-size: 24px; font-weight: 700; color: #1b1c1e; margin-bottom: 8px; letter-spacing: -0.5px; }
        .sub { font-size: 14px; color: #6b7684; margin-bottom: 30px; line-height: 1.5; }
        .info-card { background-color: #ffffff; border-radius: 16px; border: 1px solid #e5e8eb; padding: 24px; margin-bottom: 24px; }
        .card-title { font-size: 16px; font-weight: 700; color: #333d4b; margin-bottom: 16px; border-bottom: 1px solid #f2f4f6; padding-bottom: 10px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 13.5px; font-weight: 600; color: #4e5968; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d6db; font-size: 14px; font-weight: 600; color: #1b1c1e; outline: none; }
        .form-input:focus { border-color: #1967d2; background-color: #f4f9ff; }
        .btn-official { width: 100%; background-color: #1967d2; color: #ffffff; padding: 14px; border: none; border-radius: 10px; font-size: 14.5px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href='/'">
            <svg width="28" height="26" viewBox="0 0 100 90" fill="none" xmlns="http://w3.org">
                <path d="M12.5 54C13.5 53 19.5 54.5 28.5 48.5C38.5 42 47 28 56.5 19.5C65.5 11 76.5 6.5 85.5 12.5C95.5 18.5 90 32 81 37C69.5 41.5 61 33 53 41.5C43 51 28.5 63 17 61C10 59.5 6.5 53 12.5 54Z" stroke="#1967d2" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M51.5 59C58.5 67 71 68 80.5 60.5C90 53 92.5 39.5 85.5 32" stroke="#1967d2" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">SILVERWORKS</span>
        </div>
        <button class="btn-official" style="padding: 6px 12px; width:auto;" onclick="location.href='/login.html?type=employer'">사장님 로그인 / 가입 ➔</button>
    </header>

    <div class="container">
        <h1 class="title">구인 사장님 전용 전산 비즈니스 센터</h1>
        <p class="sub">피크타임 고용 지출 예산을 실시간 시뮬레이션하고, 관제실 행정 대리인과 1대1 무결점 소통을 거쳐 공고 승인 락을 해제하는 인프라 공간입니다.</p>

        <!-- [기획 오더 부활] 주휴수당 연동 인건비 모의 계산기 -->
        <div class="info-card">
            <div class="card-title">실시간 피크타임 인건비 및 법정 주휴수당 모의 계산기</div>
            <div class="form-group"><label class="form-label">소정 약정 기본 시급 (원)</label><input type="number" id="cW" class="form-input" value="10030" oninput="runCalc()"></div>
            <div class="form-group"><label class="form-label">주간 매장 구인 설정 시간 (시간)</label><input type="number" id="cH" class="form-input" value="15" oninput="runCalc()"></div>
            <div style="background-color:#f8f9fa; padding:14px; border-radius:8px; margin-bottom:14px; font-size:13.5px; line-height:1.6;">
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;"><span>기본 주급 형태 임금 총액:</span><span id="vB" style="font-weight:700;">0 원</span></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:4px; color:#1967d2;"><span>주 15시간 이상 주휴수당加:</span><span id="vE" style="font-weight:700;">0 원</span></div>
                <div style="display:flex; justify-content:space-between; padding-top:6px; border-top:1px solid #e5e8eb; font-weight:700; color:#1152b3;"><span>월간 지출 예측 인건비 예산:</span><span id="vT">0 원</span></div>
            </div>
            <button type="button" class="btn-official" onclick="runCalc()">인건비 예산 시뮬레이션 가동</button>
        </div>

        <!-- [기획 오더 부활] 1대1 상담 접수 폼 -->
        <div class="info-card">
            <div class="card-title">실버웍스 자사 전용 1대1 다이렉트 전산 행정 상담원 채널</div>
            <div class="form-group"><label class="form-label">행정 문의 요약 제목</label><input type="text" id="csT" class="form-input" placeholder="서식 보완 문의"></div>
            <div class="form-group"><label class="form-label">상세 행정 문의 사항 기입</label><textarea id="csD" class="form-input" style="height:80px; resize:none; font-family:sans-serif;"></textarea></div>
            <button type="button" class="btn-official" onclick="submitCs()">1대1 전산 행정 문의 신청 접수</button>
        </div>
    </div>

    <script>
        function runCalc() {
            const w = parseInt(document.getElementById('cW').value) || 0, h = parseFloat(document.getElementById('cH').value) || 0;
            const base = Math.floor(w * h * 4.345); const extra = h >= 15 ? Math.floor((h / 40) * 8 * w * 4.345) : 0;
            document.getElementById('vB').innerText = base.toLocaleString() + " 원";
            document.getElementById('vE').innerText = extra.toLocaleString() + " 원";
            document.getElementById('vT').innerText = (base + extra).toLocaleString() + " 원";
        }
        function submitCs() {
            if(!document.getElementById('csT').value.trim()) return;
            alert('상담 신청 접수 완료! 작성하신 서식이 관제 센터 실시간 접수단으로 직결 인계되었습니다.');
            document.getElementById('csT').value = ''; document.getElementById('csD').value = '';
        }
        runCalc();
    </script>
</body>
</html>
