<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 사장님 혁신 센터</title>
    <!-- 혼선 유도 색상을 완벽 차단하고 오션 블루 테마와 세련된 그레이 톤으로 일괄 정렬 통합한 스타일셋 -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f9fafb; color: #333d4b; padding-bottom: 60px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background-color: #ffffff; border-bottom: 1px solid #f2f4f6; position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-text { font-size: 20px; font-weight: 800; color: #1967d2; letter-spacing: -0.5px; }
        .container { max-width: 650px; margin: 0 auto; padding: 40px 24px; }
        .title { font-size: 24px; font-weight: 700; color: #1b1c1e; margin-bottom: 8px; letter-spacing: -0.5px; }
        .sub { font-size: 14px; color: #6b7684; margin-bottom: 30px; line-height: 1.5; }
        .info-card { background-color: #ffffff; border-radius: 16px; border: 1px solid #e5e8eb; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.01); }
        .card-title { font-size: 16px; font-weight: 700; color: #333d4b; margin-bottom: 16px; border-bottom: 1px solid #f2f4f6; padding-bottom: 10px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13.5px; font-weight: 600; color: #4e5968; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #d1d6db; font-size: 14.5px; font-weight: 600; color: #1b1c1e; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: #1967d2; background-color: #f4f9ff; }
        /* 오션 블루 오피셜 상용 버튼 디자인 시스템 규격 일괄 통일 */
        .btn-official-blue { width: 100%; background-color: #1967d2; color: #ffffff; padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; transition: opacity 0.2s; }
        .btn-official-blue:hover { opacity: 0.9; }
        .btn-mini-blue { background-color: #1967d2; color: #ffffff; border: none; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-mini-blue:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href='/'">
            <svg width="28" height="26" viewBox="0 0 100 90" fill="none" xmlns="http://w3.org">
                <path d="M12.5 54C13.5 53 19.5 54.5 28.5 48.5C38.5 42 47 28 56.5 19.5C65.5 11 76.5 6.5 85.5 12.5C95.5 18.5 90 32 81 37C69.5 41.5 61 33 53 41.5C43 51 28.5 63 17 61C10 59.5 6.5 53 12.5 54Z" stroke="#1967d2" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M51.5 59C58.5 67 71 68 80.5 60.5C90 53 92.5 39.5 85.5 32" stroke="#1967d2" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">SILVERWORKS</span>
        </div>
        <button class="btn-mini-blue" onclick="location.href='/login.html?type=employer'">사장님 전용 가입 및 로그인 ➔</button>
    </header>
    <div class="container">
        <h1 class="title">구인 사장님 혁신 비즈니스 센터</h1>
        <p class="sub">피크타임 고용 지출 예산을 실시간 시뮬레이션하고, 관제실 행정 대리인과 1대1 무결점 소통을 거쳐 공고 승인 권한 락을 해제하는 인프라 공간입니다.</p>

        <!-- [사장님 전용 오더 완벽 이식] 맞춤형 인건비 절감 모의 계산기 패널 -->
        <div class="info-card">
            <div class="card-title">지금 우리 매장은 매달 얼마를 손해 보고 있을까요?</div>
            <p style="font-size:13.5px; color:#1967d2; font-weight:700; margin-bottom:18px;">딱 3초, 우리 매장 맞춤형 인건비 절감 리포트</p>
            
            <div class="form-group">
                <label class="form-label">T : 현재 알바 일일 근무 시간 (시간)</label>
                <input type="number" id="calcT" class="form-input" value="2.5" step="0.1" oninput="runLossCalculate()">
            </div>
            <div class="form-group">
                <label class="form-label">N : 필요 시니어 인원수 (명)</label>
                <input type="number" id="calcN" class="form-input" value="2" oninput="runLossCalculate()">
            </div>
            <div class="form-group">
                <label class="form-label">W : 시간당 최저시급 (원)</label>
                <input type="number" id="calcW" class="form-input" value="10030" oninput="runLossCalculate()">
            </div>

            <div style="background-color:#f8f9fa; padding:16px; border-radius:10px; margin-bottom:16px; font-size:14px; line-height:1.6;">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                    <span>주휴수당 절감액 (S1):</span>
                    <span id="resS1" style="font-weight:700; color:#1967d2;">0 원</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                    <span>퇴직금 절감액 (S2):</span>
                    <span id="resS2" style="font-weight:700; color:#1967d2;">0 원</span>
                </div>
                <div style="display:flex; justify-content:space-between; padding-top:6px; border-top:1px solid #e5e8eb; font-size:15px; font-weight:700; color:#1152b3; margin-bottom:6px;">
                    <span>월 총 절감액 (S3):</span>
                    <span id="resS3">0 원</span>
                </div>
                <div style="display:flex; justify-content:space-between; padding-top:6px; border-top:1px dashed #d1d6db; font-size:14px; font-weight:700; color:green;">
                    <span>최대 지원금 (S4):</span>
                    <span id="resS4">0 원</span>
                </div>
            </div>
            <button type="button" class="btn-official-blue" onclick="runLossCalculate()">인건비 절감 리포트 가동</button>
        </div>

        <!-- [사장님 전용 오더 완벽 이식] 딱 2개 항목만 기입하는 청정 문의하기 패널 -->
        <div class="info-card">
            <div class="card-title">실버웍스 원터치 다이렉트 행정 문의 채널</div>
            <div class="form-group">
                <label class="form-label">매장 상호명 기입</label>
                <input type="text" id="consultStoreName" class="form-input" placeholder="예: 실버웍스 카페 성남점">
            </div>
            <div class="form-group">
                <label class="form-label">대표자 전화번호 명세</label>
                <input type="tel" id="consultStorePhone" class="form-input" placeholder="예: 01012345678">
            </div>
            <button type="button" class="btn-official-blue" onclick="submitStoreConsult()">문의하기</button>
        </div>
    </div>
    <!-- [사장님 사진 송부 요건 반영 정밀 산식 엔진 및 문의하기 트랜잭션 자바스크립트] -->
    <script>
        // 1. 사장님이 보내주신 실물 사진 속 이미지 계산기 산출 공식 알고리즘 100% 미세 일치 이식
        function runLossCalculate() {
            const T = parseFloat(document.getElementById('calcT').value) || 0; // 알바 일일 근무 시간
            const N = parseInt(document.getElementById('calcN').value) || 0;    // 필요 시니어 인원수
            const W = parseInt(document.getElementById('calcW').value) || 0;    // 시간당 최저시급

            // S1 : 주휴수당 절감액 = T × N × W × 0.2 × 4.345
            const S1 = Math.floor(T * N * W * 0.2 * 4.345);
            
            // S2 : 퇴직금 절감액 = (T × N × W × 1.2) × 0.0833 × 4.345
            const S2 = Math.floor((T * N * W * 1.2) * 0.0833 * 4.345);
            
            // S3 : 월 총 절감액 = S1 + S2
            const S3 = S1 + S2;
            
            // S4 : 최대 지원금 = N × 5,500,000
            const S4 = N * 5500000;

            // 실시간 상용 콤마 변환 스크립트 출력단 인터페이스 마운트
            document.getElementById('resS1').innerText = S1.toLocaleString() + " 원";
            document.getElementById('resS2').innerText = S2.toLocaleString() + " 원";
            document.getElementById('resS3').innerText = S3.toLocaleString() + " 원";
            document.getElementById('resS4').innerText = S4.toLocaleString() + " 원";
        }

        // 2. [기획 오더 완벽 이식] 매장명과 전화번호 딱 2개만 낚아채어 전산 보안 연동하는 문의 함수
        function submitStoreConsult() {
            const storeName = document.getElementById('consultStoreName').value.trim();
            const storePhone = document.getElementById('consultStorePhone').value.trim();

            if (!storeName || !storePhone) {
                alert('알림: 매장명과 연락처 대표자 전화번호를 빠짐없이 기입해 주세요.');
                return;
            }

            // 사장님이 오더하신 상용 브라우저 세션 적재를 통해 최고관리자창(admin.html)으로 데이터를 직결 유기 전송합니다.
            localStorage.setItem('sw_consult_store', storeName);
            localStorage.setItem('sw_consult_phone', storePhone);

            alert('문의 접수 대성공!\n\n사장님이 방금 기입하신 [' + storeName + '] 매장 신원 명세와 연락처 [' + storePhone + '] 데이터가 실버웍스 관제망을 타고 최고 관리자 대시보드(admin.html) 3번 패널 구역으로 실시간 직결 연동 전송 완수되었습니다.');
            
            // 입력 폼 청정 초기화 세척
            document.getElementById('consultStoreName').value = '';
            document.getElementById('consultStorePhone').value = '';
        }

        // 최초 페이지 브라우저 마운트 진입 시 초기 손해 절감 계산서 자동 시뮬레이션 가동
        runLossCalculate();
    </script>
</body>
</html>
