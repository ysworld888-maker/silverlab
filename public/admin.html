<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILVERWORKS - 최고 관리자 관제 센터</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f4f6f8; color: #111827; padding-bottom: 60px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; background-color: #ffffff; border-bottom: 1px solid #e5e8eb; position: sticky; top: 0; z-index: 100; }
        .logo-text { font-size: 20px; font-weight: 800; color: #1967d2; cursor: pointer; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .page-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; color: #1f2937; }
        
        .admin-section { background-color: #ffffff; border-radius: 12px; border: 1px solid #e5e8eb; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.01); }
        .section-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #f3f4f6; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13.5px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #f3f4f6; }
        th { background-color: #f9fafb; font-weight: 600; color: #4b5563; }
        
        .btn-action { background-color: #1967d2; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
        .btn-action:hover { background-color: #1152b3; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .badge.pending { background-color: #fef3c7; color: #d97706; }
        .badge.approved { background-color: #dbeafe; color: #1d4ed8; }
        
        .form-select, .form-input { padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <span class="logo-text" onclick="location.href='/index.html'">SILVERWORKS ADMIN</span>
        <button class="btn-action" style="background-color:#4b5563;" onclick="location.href='/index.html'">대문 메인 이동</button>
    </header>

    <div class="container">
        <h1 class="page-title">최고 관리자 실시간 관제 및 정산 데시보드</h1>

        <!-- 1. 회원 원장 및 스펙 인증 심사 센터 -->
        <div class="admin-section">
            <div class="section-title">전체 회원 권한 및 시니어 체력 검정 스펙 심사 승인</div>
            <div style="overflow-x: auto;">
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>아이디</th>
                            <th>성함/상호</th>
                            <th>구분</th>
                            <th>상태</th>
                            <th>체력등급</th>
                            <th>악력</th>
                            <th>유연성</th>
                            <th>심폐</th>
                            <th>관리 제어</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 2. 구인 사장님 10% 중개 수수료 원장 관제 -->
        <div class="admin-section">
            <div class="section-title">구인 사장님 10% 중개 수수료 청구 및 수납 확정 본부</div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>청구 ID</th>
                            <th>사장님 ID</th>
                            <th>시니어 ID</th>
                            <th>일급 액수</th>
                            <th>10% 수수료</th>
                            <th>총 청구액</th>
                            <th>수납 상태</th>
                            <th>제어</th>
                        </tr>
                    </thead>
                    <tbody id="billingTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 3. 시니어 환전 요청 관리 -->
        <div class="admin-section">
            <div class="section-title">시니어 회원 일급 포인트 현금 환전 신청 처리실</div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>환전 ID</th>
                            <th>시니어 ID</th>
                            <th>은행명</th>
                            <th>계좌번호</th>
                            <th>환전 금액</th>
                            <th>처리 상태</th>
                            <th>제어</th>
                        </tr>
                    </thead>
                    <tbody id="withdrawalTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadAdminData();
        });

        function loadAdminData() {
            // 회원 원장 로드
            fetch('/api/admin/users')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('userTableBody');
                    tbody.innerHTML = '';
                    data.users.forEach(u => {
                        tbody.innerHTML += `
                            <tr>
                                <td><b>@${u.username}</b></td>
                                <td>${u.name}</td>
                                <td>${u.role === 'employer' ? '구인 사장님' : u.role === 'seeker' ? '구직 시니어' : '관리자'}</td>
                                <td><span class="badge ${u.status}">${u.status}</span></td>
                                <td><input type="text" id="grade_${u.username}" value="${u.fitness_grade || '미인증'}" style="width:70px;" class="form-input"></td>
                                <td><input type="text" id="grip_${u.username}" value="${u.fitness_grip || '-'}" style="width:50px;" class="form-input"></td>
                                <td><input type="text" id="flex_${u.username}" value="${u.fitness_flex || '-'}" style="width:50px;" class="form-input"></td>
                                <td><input type="text" id="cardio_${u.username}" value="${u.fitness_cardio || '-'}" style="width:50px;" class="form-input"></td>
                                <td>
                                    <select id="status_${u.username}" class="form-select">
                                        <option value="pending" ${u.status==='pending'?'selected':''}>대기</option>
                                        <option value="approved" ${u.status==='approved'?'selected':''}>승인</option>
                                    </select>
                                    <button class="btn-action" onclick="updateUser('${u.username}')">저장</button>
                                </td>
                            </tr>
                        `;
                    });
                });

            // 수수료 및 환전 로그 로드
            fetch('/api/admin/match-logs')
                .then(res => res.json())
                .then(data => {
                    // 수수료 빌링
                    const bBody = document.getElementById('billingTableBody');
                    bBody.innerHTML = '';
                    data.billings.forEach(b => {
                        bBody.innerHTML += `
                            <tr>
                                <td>#${b.id}</td>
                                <td>@${b.employer_id}</td>
                                <td>@${b.seeker_id}</td>
                                <td>${b.base_wage.toLocaleString()}원</td>
                                <td style="color:#1967d2; font-weight:700;">+${b.commission.toLocaleString()}원</td>
                                <td><b>${b.total_bill.toLocaleString()}원</b></td>
                                <td><span class="badge ${b.status}">${b.status}</span></td>
                                <td>
                                    ${b.status === 'pending' ? `<button class="btn-action" onclick="clearBilling(${b.id})">입금확정(0원)</button>` : '완료됨'}
                                </td>
                            </tr>
                        `;
                    });

                    // 환전 로그
                    const wBody = document.getElementById('withdrawalTableBody');
                    wBody.innerHTML = '';
                    data.withdrawals.forEach(w => {
                        wBody.innerHTML += `
                            <tr>
                                <td>#${w.id}</td>
                                <td>@${w.seeker_id}</td>
                                <td>${w.bank_name}</td>
                                <td>${w.account_number}</td>
                                <td><b>${w.amount.toLocaleString()}P</b></td>
                                <td><span class="badge ${w.status}">${w.status}</span></td>
                                <td>
                                    ${w.status === 'pending' ? `<button class="btn-action" onclick="completeWithdrawal(${w.id})">송금완료</button>` : '처리완료'}
                                </td>
                            </tr>
                        `;
                    });
                });
        }

        function updateUser(username) {
            const status = document.getElementById(`status_${username}`).value;
            const grade = document.getElementById(`grade_${username}`).value;
            const grip = document.getElementById(`grip_${username}`).value;
            const flex = document.getElementById(`flex_${username}`).value;
            const cardio = document.getElementById(`cardio_${username}`).value;

            fetch('/api/admin/update-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_username: username, status, fitness_grade: grade, fitness_grip: grip, fitness_flex: flex, fitness_cardio: cardio })
            }).then(() => {
                alert(`@${username} 회원 정보가 성공적으로 전산 갱신되었습니다.`);
                loadAdminData();
            });
        }

        function clearBilling(billingId) {
            fetch('/api/admin/settle/clear-employer-invoice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ billing_id: billingId })
            }).then(() => {
                alert('사장님 중개 수수료 수납이 최종 확정 처리되었습니다.');
                loadAdminData();
            });
        }

        function completeWithdrawal(withdrawalId) {
            fetch('/api/admin/settle/complete-seeker', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ withdrawal_id: withdrawalId })
            }).then(() => {
                alert('환전 송금 처리가 완료되었습니다.');
                loadAdminData();
            });
        }
    </script>
</body>
</html>
