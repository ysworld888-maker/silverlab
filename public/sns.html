<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 소셜 소통 센터</title>
    <!-- 트위터(X)의 타임라인 미학과 인스타 DM의 직관성을 융합한 프리미엄 소셜 CSS 스타일 명세 -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f9fafb; color: #262626; padding-bottom: 60px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background-color: #ffffff; border-bottom: 1px solid #e5e8eb; position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-text { font-size: 20px; font-weight: 800; color: #1967d2; letter-spacing: -0.5px; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; display: grid; grid-template-columns: 1fr; gap: 24px; }
        .info-card { background-color: #ffffff; border-radius: 16px; border: 1px solid #e5e8eb; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.01); }
        .card-header-title { font-size: 16px; font-weight: 700; color: #1b1c1e; margin-bottom: 16px; border-bottom: 1px solid #f2f4f6; padding-bottom: 10px; letter-spacing: -0.3px; }
        
        /* 세그먼트 소셜 상단 탭 메뉴 규격 */
        .sns-tab-group { display: flex; background-color: #f2f4f6; border-radius: 12px; padding: 4px; margin-bottom: 8px; gap: 4px; }
        .sns-tab-btn { flex: 1; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 700; color: #4e5968; background-color: transparent; cursor: pointer; transition: all 0.2s; text-align: center; }
        .sns-tab-btn.active { background-color: #1967d2; color: #ffffff; box-shadow: 0 2px 6px rgba(25, 103, 210, 0.15); }
        
        .sns-panel { display: none; } .sns-panel.active { display: block; }
        
        /* 트위터(X)/스레드 타임라인 양식 스타일 */
        .form-textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #d1d6db; font-size: 14.5px; font-weight: 500; color: #1b1c1e; outline: none; resize: none; height: 90px; transition: border-color 0.2s; }
        .form-textarea:focus { border-color: #1967d2; background-color: #f4f9ff; }
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d6db; font-size: 14px; font-weight: 600; outline: none; }
        .form-input:focus { border-color: #1967d2; }
        
        .post-item-box { border-bottom: 1px solid #f2f4f6; padding: 16px 4px; line-height: 1.6; }
        .post-item-box:last-child { border-bottom: none; }
        .post-author { font-weight: 700; color: #1967d2; margin-right: 6px; font-size: 14.5px; }
        .post-time { font-size: 12px; color: #8b95a1; margin-left: 8px; }
        .post-text { font-size: 14.5px; color: #333d4b; margin-top: 4px; }
        
        /* 인스타그램 다이렉트 메시지(DM) 윈도우 스타일 */
        .dm-chat-window { border: 1px solid #e5e8eb; border-radius: 12px; height: 320px; overflow-y: auto; padding: 16px; background-color: #f9fafb; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
        .dm-bubble { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; font-weight: 500; word-break: break-all; }
        .dm-bubble.mine { background-color: #1967d2; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .dm-bubble.opp { background-color: #ffffff; color: #262626; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #e5e8eb; }
        .dm-sender-label { font-size: 11px; color: #8b95a1; margin-bottom: -4px; font-weight: 600; }
        
        /* 100점 만점 평판 검증 보드 */
        .rep-card-item { padding: 14px; border-bottom: 1px solid #f2f4f6; font-size: 14px; line-height: 1.6; }
        .rep-card-item:last-child { border-bottom: none; }
        .rep-score-tag { display: inline-block; background-color: #fff0f0; color: #f5222d; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 800; margin-left: 6px; }
        .rep-score-tag.high { background-color: #e8f3ff; color: #1967d2; }
        
        .btn-official-blue { width: 100%; background-color: #1967d2; color: #ffffff; padding: 14px; border: none; border-radius: 10px; font-size: 14.5px; font-weight: 600; cursor: pointer; text-align: center; transition: opacity 0.2s; }
        .btn-official-blue:hover { opacity: 0.9; }
        .btn-mini-blue { background-color: #1967d2; color: #ffffff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container" onclick="location.href='/'">
            <svg width="28" height="26" viewBox="0 0 100 90" fill="none" xmlns="http://w3.org">
                <path d="M12.5 54C13.5 53 19.5 54.5 28.5 48.5C38.5 42 47 28 56.5 19.5C65.5 11 76.5 6.5 85.5 12.5+M" stroke="#1967d2" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M51.5 59C58.5 67 71 68 80.5 60.5C90 53 92.5 39.5 85.5 32" stroke="#1967d2" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">SILVERWORKS 소셜룸</span>
        </div>
        <button class="btn-mini-blue" onclick="location.href='/profile.html'">마이페이지 가기</button>
    </header>
    <div class="container">
        <!-- 3대 채널 통합 세그먼트 단추 대화 상자 제어 링크선 -->
        <div class="sns-tab-group">
            <button type="button" id="tabBtnTimeline" class="sns-tab-btn active" onclick="switchSnsPanel('timeline')">구인구직 타임라인 (X/스레드)</button>
            <button type="button" id="tabBtnDm" class="sns-tab-btn" onclick="switchSnsPanel('dm')">비밀 디엠 메세지 (인스타DM)</button>
            <button type="button" id="tabBtnRep" class="sns-tab-btn" onclick="switchSnsPanel('rep')">100점 평판 보증서 기입실</button>
        </div>

        <!-- [채널 1 구역] 트위터(X)/스레드 방식의 자율 한 줄 피드 타임라인 패널 -->
        <div id="panelTimeline" class="sns-panel active">
            <div class="info-card" style="margin-bottom:18px;">
                <div class="card-header-title">지금 우리 공동체에 한 줄 생각 피드 배포하기</div>
                <div class="form-group">
                    <textarea id="postContentInput" class="form-textarea" placeholder="지금 어떤 생각을 하고 계시나요? 구인 사장님, 구직 시니어 회원들과 자율적으로 소통해 보세요."></textarea>
                </div>
                <button type="button" class="btn-official-blue" onclick="handleSubmitSnsPost()">실시간 소셜 한 줄 피드 배포 적재</button>
            </div>
            <div class="info-card">
                <div class="card-header-title">실버웍스 소셜 라이브 타임라인 피드 피드백</div>
                <div id="timelineFeedContainer"></div>
            </div>
        </div>

        <!-- [채널 2 구역] 인스타그램 디엠(DM) 규격의 회원간 1대1 비밀 통신 메시지 패널 -->
        <div id="panelDm" class="sns-panel">
            <div class="info-card">
                <div class="card-header-title">인스타그램 DM 규격 1대1 다이렉트 비밀 메시지 룸</div>
                <div class="form-group" style="display:flex; gap:10px; margin-bottom:12px;">
                    <input type="text" id="dmReceiverInput" class="form-input" placeholder="상대방 회원 아이디(ID)를 정확히 입력하세요">
                    <button type="button" class="btn-mini-blue" style="min-width:90px;" onclick="handleFetchDmLog()">비밀대화 연결</button>
                </div>
                
                <!-- 실시간 메시지 버블이 착륙 표출되는 채팅 윈도우 -->
                <div id="dmChatWindowBox" class="dm-chat-window">
                    <div style="text-align:center; color:#8b95a1; font-size:13px; margin:auto 0;">상대방 아이디를 지정하여 대화방을 개통해 주세요.</div>
                </div>

                <div class="form-group" style="display:flex; gap:10px; margin-bottom:0;">
                    <input type="text" id="dmMessageInput" class="form-input" placeholder="비밀 메시지 내용을 타이핑하세요..." onkeypress="if(event.keyCode===13) handleSendDmMessage()">
                    <button type="button" class="btn-mini-blue" style="min-width:80px; background-color:#1967d2;" onclick="handleSendDmMessage()">보내기</button>
                </div>
            </div>
        </div>

        <!-- [채널 3 구역] 사장님 지시 전면 반영: 100점 만점 기준 절대 평판 지수 기입 패널 -->
        <div id="panelRep" class="sns-panel">
            <div class="info-card">
                <div class="card-header-title">100점 절대 평점 기준 회원 평판 검증 보증서 기입 제출처</div>
                <p style="font-size:13px; color:#6b7684; margin-bottom:16px; line-height:1.5;">상대방 회원(특히 근무 시니어)의 아이디를 지정하고 100점 만점 기준으로 점수와 피드백을 주입해 주세요. 평정 즉시 해당 회원의 프로필 평판 평점 지표에 동적 누적 연동 반영됩니다.</p>
                
                <div class="form-group">
                    <label class="form-label">평가 대상 회원 아이디 (ID)</label>
                    <input type="text" id="repTargetInput" class="form-input" placeholder="대상자 아이디를 기입하세요">
                </div>
                <div class="form-group">
                    <label class="form-label">부여할 절대 평판 신용 점수 (1점 ~ 100점 만점 자율 배정)</label>
                    <input type="number" id="repScoreInput" class="form-input" min="1" max="100" value="100">
                </div>
                <div class="form-group">
                    <label class="form-label">사장님/동료 관점의 명확한 실물 평판 검증 피드백 문장</label>
                    <input type="text" id="repTextInput" class="form-input" placeholder="예: 무단 노쇼나 주휴수당 분쟁 소지 없이 100점 만점에 100점짜리 베테랑 근무 성실도를 보여주셨습니다.">
                </div>
                <button type="button" class="btn-official-blue" onclick="handleRegisterSnsReputation()">100점 기준 평판 보증서 실시간 제출 송출</button>
            </div>
        </div>
    </div>
    <!-- [X타임라인·인스타DM·100점평판 실시간 바인딩 가동 엔진 스크립트] -->
    <script>
        let myId = null;
        let dmInterval = null;

        document.addEventListener("DOMContentLoaded", function() {
            myId = localStorage.getItem('sw_username');
            if (!myId) {
                alert('알림: 보안 세션이 만료되었습니다. 로그인 페이지로 워프합니다.');
                location.href = '/login.html';
                return;
            }
            loadTimelinePosts();
        });

        // 3대 소셜 채널 탭 패널 동적 전환 스위칭 함수
        function switchSnsPanel(type) {
            document.querySelectorAll('.sns-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.sns-panel').forEach(p => p.classList.remove('active'));
            clearInterval(dmInterval);

            if (type === 'timeline') {
                document.getElementById('tabBtnTimeline').classList.add('active');
                document.getElementById('panelTimeline').classList.add('active');
                loadTimelinePosts();
            } else if (type === 'dm') {
                document.getElementById('tabBtnDm').classList.add('active');
                document.getElementById('panelDm').classList.add('active');
            } else {
                document.getElementById('tabBtnRep').classList.add('active');
                document.getElementById('panelRep').classList.add('active');
            }
        }

        // 1. 트위터(X)/스레드 방식 실시간 타임라인 게시글 파싱 로드 함수
        function loadTimelinePosts() {
            const container = document.getElementById('timelineFeedContainer');
            fetch('/api/sns/posts')
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = '';
                    if (!data.posts || data.posts.length === 0) {
                        container.innerHTML = '<p style="text-align:center; color:#8b95a1; padding:20px 0; font-size:13.5px;">현재 실시간 타임라인에 등록된 게시글 소통 피드가 없습니다.</p>';
                        return;
                    }
                    data.posts.forEach(p => {
                        container.innerHTML += `
                            <div class="post-item-box">
                                <div>
                                    <span class="post-author" style="cursor:pointer;" onclick="location.href='/profile.html?username=${p.username}'">${p.username}</span>
                                    <span class="post-time">${new Date(p.created_at).toLocaleString('ko-KR')}</span>
                                </div>
                                <div class="post-text">${p.content}</div>
                            </div>
                        `;
                    });
                });
        }

        function handleSubmitSnsPost() {
            const content = document.getElementById('postContentInput').value.trim();
            if (!content) { alert('내용을 입력하세요.'); return; }

            fetch('/api/sns/posts/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: myId, content: content })
            }).then(() => {
                alert('소셜 타임라인 한 줄 피드 배포 적재 성공!');
                document.getElementById('postContentInput').value = '';
                loadTimelinePosts();
            });
        }

        // 2. 인스타그램 DM 규격 1대1 다이렉트 메시지 실시간 파싱 추적 함수
        function handleFetchDmLog() {
            const receiver = document.getElementById('dmReceiverInput').value.trim();
            if (!receiver) { alert('상대방 아이디를 기입하세요.'); return; }
            if (receiver === myId) { alert('알림: 나 자신과의 대화방은 지원하지 않습니다.'); return; }

            clearInterval(dmInterval);
            const win = document.getElementById('dmChatWindowBox');

            const fetchAction = () => {
                fetch(`/api/sns/dms?sender=${myId}&receiver=${encodeURIComponent(receiver)}`)
                    .then(res => res.json())
                    .then(data => {
                        win.innerHTML = '';
                        if (!data.dms || data.dms.length === 0) {
                            win.innerHTML = `<div style="text-align:center; color:#8b95a1; font-size:13px; margin:auto 0;">${receiver} 회원님과의 비밀 대화방이 개통되었습니다. 선제 메시지를 보내보세요.</div>`;
                            return;
                        }
                        data.dms.forEach(d => {
                            const isMine = d.sender === myId;
                            win.innerHTML += `
                                <div class="dm-sender-label" style="align-self: ${isMine ? 'flex-end' : 'flex-start'}">${d.sender}</div>
                                <div class="dm-bubble ${isMine ? 'mine' : 'opp'}">${d.message}</div>
                            `;
                        });
                        win.scrollTop = win.scrollHeight;
                    });
            };

            fetchAction();
            dmInterval = setInterval(fetchAction, 2000); // 2초 주기 실시간 폴링 가동
        }

        function handleSendDmMessage() {
            const receiver = document.getElementById('dmReceiverInput').value.trim();
            const message = document.getElementById('dmMessageInput').value.trim();
            if (!receiver || !message) return;

            fetch('/api/sns/dms/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sender: myId, receiver: receiver, message: message })
            }).then(() => {
                document.getElementById('dmMessageInput').value = '';
                handleFetchDmLog();
            });
        }

        // 3. [사장님 지시 완벽 이행] 100점 기준 절대 평판 신용 서식 제출 등록 함수
        function handleRegisterSnsReputation() {
            const target = document.getElementById('repTargetInput').value.trim();
            const score = parseInt(document.getElementById('repScoreInput').value) || 100;
            const text = document.getElementById('repTextInput').value.trim();

            if (!target || !text) { alert('대상 아이디와 평판 피드백 문항을 빠짐없이 기입해 주세요.'); return; }
            if (score < 1 || score > 100) { alert('평판 점수는 1점부터 100점 만점 범위 내에서 기입하셔야 전산 연동됩니다.'); return; }

            fetch('/api/sns/reputation/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_id: target, author_id: myId, review_text: text, score: score })
            }).then(() => {
                alert(`100점 만점 기준 절대 평판 보증서 제출 대성공!\n\n${target} 회원님의 신용 지표 지리에 즉시 마운트 누적 결속되었습니다.\n본 명세 로그 데이터는 최고 관리자 콘솔 대시보드(admin.html)로 실시간 전달 연동되었습니다.`);
                document.getElementById('repTargetInput').value = '';
                document.getElementById('repScoreInput').value = 100;
                document.getElementById('repTextInput').value = '';
            });
        }
    </script>
</body>
</html>
