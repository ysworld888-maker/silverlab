<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILVERWORKS - 구직 시니어 문진표</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #ffffff; color: #0f1419; padding: 20px; display: flex; justify-content: center; }
        .qa-wrap-box { width: 100%; max-width: 500px; padding: 24px; border: 1px solid #eff3f4; border-radius: 16px; }
        .main-title { font-size: 20px; font-weight: 800; color: #1967d2; text-align: center; margin-bottom: 24px; }
        .q-row { margin-bottom: 18px; border-bottom: 1px solid #f7f9fa; padding-bottom: 14px; }
        .q-label { font-size: 14px; font-weight: 700; color: #0f1419; margin-bottom: 8px; display: block; }
        .form-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cfd9de; font-size: 14.5px; outline: none; }
        .form-input:focus { border-color: #1967d2; background-color: #f4f9ff; }
        .btn-submit-blue { width: 100%; background-color: #1967d2; color: #ffffff; border: none; padding: 14px; border-radius: 9999px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; box-shadow: 0 4px 12px rgba(25,103,210,0.1); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="qa-wrap-box">
        <h2 class="main-title">구직 베테랑 12단계 정밀 건강 문진표</h2>
        <form id="qaForm" onsubmit="return false;">
            <div id="qaContainer"></div>
            <button type="button" class="btn-submit-blue" onclick="handleRegisterSeniorQaAnswers()">12단계 정밀 문진형 이력서 최종 제출</button>
        </form>
    </div>

    <script>
        const qLabels = [
            "조력자 구분 명세 (자신 작성 또는 대리인)", "구직 베테랑 성함 명세", "생년월일 명세 (예: 1955년생)", 
            "휴대폰 번호 연락처 명세", "근무 희망 동네 지역 명세", "3층 계단 보행력 지표 상태", 
            "1시간 연속 도보 가능성 여부", "현장 주의가 필요한 지병 데이터", "식당 및 마트 청력 소통도 유무", 
            "카카오톡 메시지 원활 활용도", "초단기(하루 3시간) 근로 수용성", "정부 노인일자리 중복참여 이력"
        ];

        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('qaContainer');
            qLabels.forEach((label, i) => {
                container.innerHTML += `
                    <div class="q-row">
                        <label class="q-label">문항 ${i+1}. ${label}</label>
                        <input type="text" id="q_${i+1}" class="form-input" placeholder="답변 내용을 상세히 기입하세요" required>
                    </div>`;
            });
        });

        // [요구사항 1번 완벽 구현] 문진 작성을 완료하는 즉시 투박한 프로필이 아닌 대문 메인 홈페이지(index.html)로 안전 다이렉트 직결 복귀 리다이렉트
        function handleRegisterSeniorQaAnswers() {
            const id = localStorage.getItem('sw_username');
            if(!id) { location.href = '/login.html'; return; }

            // 1번 문항의 대표 데이터 추출 파싱
            const firstAnswer = document.getElementById('q_1').value.trim();
            if(!firstAnswer) { alert('모든 문항에 답변을 기입해 주십시오.'); return; }

            fetch('/api/senior/qa', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: id, answers: firstAnswer })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert('12단계 정밀 건강 문진표 이력서가 성공적으로 보존 제출되었습니다!');
                    // [지시 반영] 메인 대문 대광장 화면으로 앵커 복귀 리다이렉트
                    location.href = '/index.html';
                }
            });
        }
    </script>
</body>
</html>
